<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- ИГРОВОЙ КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <div class="top-actions">
            <button id="statsToggleBtn" title="Статистика и лидеры">📊</button>
            <button id="settingsBtn" title="Настройки">⚙️</button>
        </div>
        <div class="subtitle">Кликни по луне</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock" class="auth-form">
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <!-- Поля входа -->
            <div id="loginFields">
                <div class="login-type">
                    <label><input type="radio" name="loginType" value="email" checked /> По почте</label>
                    <label><input type="radio" name="loginType" value="username" /> По логину</label>
                </div>
                <input type="text" id="loginInput" placeholder="Email вашего аккаунта" />
                <input type="password" id="loginPassword" placeholder="Пароль" />
            </div>

            <!-- Поля регистрации -->
            <div id="registerFields" class="hidden">
                <input type="text" id="regUsername" placeholder="Придумайте игровой логин (уникальный)" />
                <input type="email" id="regEmail" placeholder="Ваш Email (для восстановления)" />
                <input type="password" id="regPassword" placeholder="Надежный пароль" />
            </div>

            <button id="actionBtn" class="btn-primary">Войти</button>
            <div id="authMessage" class="auth-message"></div>
        </div>

        <!-- ИГРОВАЯ ПАНЕЛЬ -->
        <div id="gameArea" class="game-area">
            <div class="level-container">
                <div id="levelTitle" class="level-title">Уровень 1</div>
                <div class="hp-container">
                    <div class="bar-background">
                        <div id="hpBar" class="bar-fill hp-fill" style="width: 100%;"></div>
                    </div>
                    <div id="hpPercent" class="bar-text">100/100</div>
                </div>

                <!-- Таймер босса -->
                <div id="timerBarContainer" class="timer-container">
                    <div class="bar-background">
                        <div id="timerBar" class="bar-fill timer-fill" style="width: 100%;"></div>
                    </div>
                    <div id="timerPercent" class="bar-text">30с</div>
                </div>
            </div>

            <!-- Луна -->
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon-inner" id="moonInner"></div>
                <div class="click-effect" id="clickEffect">💥</div>
            </div>

            <div class="counter-container">
                <div class="counter-label">Всего кликов:</div>
                <div id="counter" class="counter-value">0</div>
            </div>

            <div class="time-container">
                ⏱️ В игре: <span id="totalTimeDisplay">00:00:00</span>
            </div>

            <div class="control-buttons">
                <button id="rollbackBtnMain" class="btn-secondary disabled" title="Вернуться на 1 уровень назад">↩️ Шаг назад</button>
                <button id="lockToggleMain" class="btn-secondary" title="Заблокировать переход на следующий уровень">🔓</button>
            </div>
        </div>
    </div>

    <!-- ---------- БОКОВАЯ ПАНЕЛЬ (ЛИДЕРЫ И ПРОФИЛЬ) ---------- -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <div class="panel-tabs">
                <button class="active" data-tab="leaders">🏆 Лидеры</button>
                <button data-tab="profile">👤 Профиль</button>
            </div>
            <div class="panel-actions">
                <button id="refreshDataBtn" class="panel-refresh-btn" title="Обновить данные">🔄</button>
                <button class="panel-close" id="panelClose">✕</button>
            </div>
        </div>

        <!-- Вкладка Лидеры -->
        <div class="panel-content active" id="panelLeaders">
            <div id="leadersList" class="leaders-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>

        <!-- Вкладка Профиль -->
        <div class="panel-content" id="panelProfile">
            <div id="profileContent" class="profile-content">
                <div class="loading">Загрузка...</div>
            </div>
            <button class="btn-danger" id="logoutBtn" style="margin-top: 20px; width: 100%;">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- ---------- НАСТРОЙКИ (МОДАЛКА) ---------- -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">⚙️ Настройки</div>

            <div class="section-title">🎨 Внешний вид луны</div>
            <div class="bg-options" id="bgOptions">
                <button data-bg="normal" class="active">🌕 Обычная</button>
                <button data-bg="blood">🩸 Кровавая</button>
            </div>

            <div class="section-title">🛠️ Тестирование</div>
            <div class="checkbox-row">
                <label>
                    <input type="checkbox" id="testModeCheckbox" /> 1 клик = 1 уровень (убивает любую луну)
                </label>
            </div>

            <div class="account-info">
                <p>👤 <strong id="accountNickname">Гость</strong></p>
                <p>📧 <strong id="accountEmail">-</strong></p>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="section-title">🗑️ Прогресс</div>
                <button class="btn-danger" id="resetProgressBtn">Сбросить прогресс</button>
            </div>

            <button class="close-btn" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

    <!-- ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Вы уверены, что хотите сбросить весь прогресс? Это действие необратимо.</p>
            <div class="buttons">
                <button class="btn-yes" id="confirmYes">Да</button>
                <button class="btn-no" id="confirmNo">Нет</button>
            </div>
        </div>
    </div>

    <!-- ---------- TOAST-КОНТЕЙНЕР ---------- -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
