<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- ИГРОВОЙ КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <div class="top-actions">
            <button id="statsToggleBtn" title="Статистика и лидеры">📊</button>
            <button id="settingsBtn" title="Настройки">⚙️</button>
        </div>
        <div class="subtitle">Кликни по луне</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock" class="auth-form">
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <div id="loginFields">
                <div class="login-type">
                    <label><input type="radio" name="loginType" value="email" checked /> По email</label>
                    <label><input type="radio" name="loginType" value="nickname" /> По логину</label>
                </div>
                <div class="row">
                    <input type="text" id="loginInput" placeholder="Логин или email" />
                    <input type="password" id="passwordInput" placeholder="Пароль" />
                </div>
            </div>

            <div id="registerFields" class="hidden">
                <div class="row">
                    <input type="email" id="regEmailInput" placeholder="Email (обязательно)" />
                    <input type="text" id="regNicknameInput" placeholder="Логин (обязательно)" />
                    <input type="password" id="regPasswordInput" placeholder="Пароль (минимум 6 символов)" />
                </div>
            </div>

            <div class="buttons">
                <button id="actionBtn">Войти</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <!-- ИГРОВАЯ ЗОНА -->
        <div id="gameArea" class="game-area">
            <div class="level-title" id="levelTitle">Уровень 1</div>

            <!-- Луна -->
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon">
                    <div class="moon-inner" id="moonInner"></div>
                </div>
                <div class="click-effect" id="clickEffect"></div>
            </div>

            <!-- HP и таймер (под луной) -->
            <div class="bars">
                <div class="bar-container">
                    <span class="bar-label">❤️</span>
                    <div class="bar-track">
                        <div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div>
                    </div>
                    <span class="bar-percent" id="hpPercent">100/100</span>
                </div>
                <div class="bar-container timer-bar-container" id="timerBarContainer">
                    <span class="bar-label">⏱️</span>
                    <div class="bar-track">
                        <div class="bar-fill timer-fill" id="timerBar" style="width:100%"></div>
                    </div>
                    <span class="bar-percent" id="timerPercent">30с</span>
                </div>
            </div>

            <!-- Счётчик кликов по центру -->
            <div class="counter" id="counter">0</div>

            <div class="game-controls">
                <button class="btn-rollback" id="rollbackBtnMain" title="Откатить уровень">⬅️</button>
                <button class="lock-toggle" id="lockToggleMain" title="Зафиксировать уровень">🔓</button>
            </div>

            <button class="logout-btn" id="logoutBtn">🚀 Выйти</button>
        </div>
    </div>

    <!-- ---------- БОКОВАЯ ПАНЕЛЬ ---------- -->
    <div class="side-panel" id="sidePanel">
        <button class="panel-close" id="panelClose">✕</button>
        <div class="panel-tabs">
            <button class="active" data-tab="leaders">🏆</button>
            <button data-tab="profile">👤</button>
        </div>
        <div class="panel-actions">
            <button id="refreshDataBtn" class="panel-refresh-btn" title="Обновить данные">🔄</button>
        </div>
        <div class="panel-content active" id="panelLeaders">
            <div style="color: rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:10px;">Топ игроков</div>
            <div id="leadersList">
                <div class="no-data">Загрузка...</div>
            </div>
        </div>
        <div class="panel-content" id="panelProfile">
            <div style="color: rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:10px;">Мой профиль</div>
            <div id="profileContent">
                <div class="no-data">Войдите, чтобы увидеть статистику</div>
            </div>
        </div>
    </div>

    <!-- ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Настройки</h2>

            <div class="section-title">🧪 Тестовый режим</div>
            <div class="checkbox-row">
                <label>
                    <input type="checkbox" id="testModeCheckbox" /> 1 клик = 1 уровень (убивает любую луну)
                </label>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="section-title">🗑️ Прогресс</div>
                <button class="btn-danger" id="resetProgressBtn">Сбросить прогресс</button>
            </div>

            <button class="close-btn" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

    <!-- ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Вы уверены, что хотите сбросить весь прогресс? Это действие необратимо.</p>
            <div class="buttons">
                <button class="btn-yes" id="confirmYes">Да</button>
                <button class="btn-no" id="confirmNo">Нет</button>
            </div>
        </div>
    </div>

    <!-- ---------- TOAST-КОНТЕЙНЕР ---------- -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
