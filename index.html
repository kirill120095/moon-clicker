<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        /* ---------- ГЛОБАЛЬНЫЙ ФОН ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ---------- ГАЛАКТИКА ---------- */
        .galaxy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #0d1b2a, #1b1f3a 60%, #0b0e1a);
            overflow: hidden;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 180, 100, 0.2);
            animation: orbit linear infinite;
            pointer-events: none;
        }
        .planet::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            top: 15%;
            left: 20%;
        }
        .planet-1 {
            width: 60px; height: 60px;
            top: 15%; left: 85%;
            background: radial-gradient(circle at 30% 30%, #ffb07c, #d98c5f);
            animation-duration: 25s;
            animation-name: orbit1;
            box-shadow: 0 0 60px rgba(255, 150, 80, 0.2);
        }
        .planet-2 {
            width: 40px; height: 40px;
            top: 75%; left: 10%;
            background: radial-gradient(circle at 30% 30%, #8fc7ff, #4a7db5);
            animation-duration: 35s;
            animation-name: orbit2;
            box-shadow: 0 0 50px rgba(100, 180, 255, 0.2);
        }
        @keyframes orbit1 {
            0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            0% { transform: rotate(0deg) translateX(-180px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(-180px) rotate(-360deg); }
        }
        @media (max-width: 600px) {
            .planet-1 { width: 40px; height: 40px; }
            .planet-2 { width: 30px; height: 30px; }
            @keyframes orbit1 {
                0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
            }
            @keyframes orbit2 {
                0% { transform: rotate(0deg) translateX(-90px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(-90px) rotate(-360deg); }
            }
        }

        /* ---------- КОНТЕЙНЕР ---------- */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 520px;
            width: 100%;
        }

        /* ---------- ЗАГОЛОВОК ---------- */
        .subtitle {
            font-size: 2.2rem;
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(255, 215, 150, 0.15);
            margin-bottom: 20px;
        }

        /* ---------- ШЕСТЕРЁНКА ---------- */
        .settings-icon {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.6rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            z-index: 10;
            background: none;
            border: none;
            line-height: 1;
        }
        .settings-icon:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: rotate(60deg);
        }

        /* ---------- ФОРМА АВТОРИЗАЦИИ ---------- */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 30px;
        }
        .auth-form .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .auth-form .tabs button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .auth-form .tabs button.active {
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border-color: rgba(255, 215, 150, 0.3);
        }
        .auth-form .tabs button:hover {
            background: rgba(255, 215, 150, 0.1);
        }
        .auth-form .login-type {
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .auth-form .login-type label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .auth-form .login-type input[type="radio"] {
            accent-color: #f0e6d0;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .auth-form input {
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #f0e6d0;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .auth-form input:focus {
            border-color: rgba(255, 215, 150, 0.5);
        }
        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .auth-form .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .auth-form button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border: 1px solid rgba(255, 215, 150, 0.2);
        }
        .auth-form button:hover {
            background: rgba(255, 215, 150, 0.25);
            transform: scale(1.03);
        }
        .auth-form .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .auth-form .success {
            color: #69db7c;
            font-size: 0.85rem;
        }
        .hidden {
            display: none !important;
        }

        /* ---------- ИГРОВАЯ ЗОНА ---------- */
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }

        /* ---------- ЛУНА ---------- */
        .moon-wrapper {
            display: inline-block;
            cursor: pointer;
            position: relative;
            margin: 15px 0;
            width: 260px;
            height: 260px;
            transition: transform 0.2s ease;
        }
        .moon-wrapper:hover {
            transform: scale(1.08);
        }
        .moon-wrapper:active {
            transform: scale(0.92);
        }

        .moon {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f5f0e8, #c8bda8 60%, #8a7e6b);
            box-shadow:
                0 0 50px rgba(255, 215, 150, 0.4),
                0 0 100px rgba(255, 215, 150, 0.2),
                inset -30px -30px 80px rgba(0, 0, 0, 0.4),
                inset 30px 30px 80px rgba(255, 255, 255, 0.3);
            position: relative;
            animation: moonOrbit 30s linear infinite, pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes moonOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 40px rgba(255,215,150,0.3), 0 0 80px rgba(255,215,150,0.1), inset -30px -30px 80px rgba(0,0,0,0.4), inset 30px 30px 80px rgba(255,255,255,0.3); }
            100% { box-shadow: 0 0 80px rgba(255,215,150,0.6), 0 0 160px rgba(255,215,150,0.3), inset -30px -30px 80px rgba(0,0,0,0.5), inset 30px 30px 80px rgba(255,255,255,0.4); }
        }

        /* Кратеры через ::before и ::after с box-shadow */
        .moon::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(160, 140, 120, 0.5), rgba(100, 85, 75, 0.7));
            top: 20%;
            left: 18%;
            box-shadow:
                80px 60px 0 -10px rgba(120, 100, 85, 0.4),
                -40px 90px 0 -15px rgba(140, 120, 105, 0.3),
                100px -40px 0 -20px rgba(130, 110, 95, 0.35),
                -80px -30px 0 -8px rgba(110, 90, 80, 0.3),
                40px -80px 0 -12px rgba(120, 100, 90, 0.25),
                -100px 20px 0 -6px rgba(140, 120, 105, 0.3),
                120px 10px 0 -25px rgba(130, 110, 95, 0.2),
                -60px -70px 0 -18px rgba(110, 90, 80, 0.3),
                20px 120px 0 -10px rgba(140, 120, 105, 0.25),
                -20px -100px 0 -14px rgba(120, 100, 90, 0.3),
                140px -60px 0 -30px rgba(130, 110, 95, 0.15),
                -140px 40px 0 -22px rgba(110, 90, 80, 0.2);
        }
        .moon::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(180, 160, 140, 0.3), rgba(100, 85, 75, 0.6));
            top: 60%;
            left: 70%;
            box-shadow:
                -80px -40px 0 -8px rgba(140, 120, 105, 0.3),
                -120px 50px 0 -12px rgba(130, 110, 95, 0.2),
                50px -100px 0 -6px rgba(120, 100, 90, 0.25),
                100px 80px 0 -20px rgba(140, 120, 105, 0.15),
                -50px 120px 0 -10px rgba(110, 90, 80, 0.2);
        }

        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 150, 0.5), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .click-effect.active {
            animation: flash 0.4s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
        }

        /* ---------- СЧЁТЧИК ---------- */
        .counter {
            margin: 10px 0 5px;
            color: #f0e6d0;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 215, 150, 0.2);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 30px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 140px;
        }
        .counter-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        /* ---------- ИНФО (никнейм + время) ---------- */
        .player-info {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.7rem;
            margin-top: 8px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .player-info .nickname {
            color: rgba(255, 255, 255, 0.5);
        }
        .player-info .time {
            color: rgba(255, 215, 150, 0.5);
        }

        /* ---------- КНОПКА ВЫХОДА ---------- */
        .logout-btn {
            margin-top: 15px;
            padding: 8px 25px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .logout-btn:active {
            transform: scale(0.95);
        }

        /* ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1f35;
            border-radius: 30px;
            padding: 30px 40px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        .modal h2 {
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255, 215, 150, 0.1);
            color: #f0e6d0;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 215, 150, 0.1);
        }
        .modal button:hover {
            background: rgba(255, 215, 150, 0.2);
            transform: scale(1.02);
        }
        .modal .danger {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.2);
            color: #ff6b6b;
        }
        .modal .danger:hover {
            background: rgba(255, 80, 80, 0.25);
        }
        .modal .close-btn {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
        }
        .modal .close-btn:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }
        .modal .confirm-text {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            text-align: center;
            margin: 10px 0;
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 600px) {
            .moon-wrapper { width: 200px; height: 200px; }
            .counter { font-size: 2.5rem; padding: 6px 20px; min-width: 100px; }
            .subtitle { font-size: 1.6rem; letter-spacing: 4px; }
            .container { padding: 20px; }
            .settings-icon { font-size: 1.3rem; top: 10px; right: 15px; }
            .planet-1 { width: 30px; height: 30px; }
            .planet-2 { width: 20px; height: 20px; }
        }
        @media (max-width: 400px) {
            .moon-wrapper { width: 160px; height: 160px; }
            .counter { font-size: 2rem; padding: 4px 15px; min-width: 70px; }
            .subtitle { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <!-- Шестерёнка (настройки) -->
        <button class="settings-icon" id="settingsBtn" title="Настройки">⚙️</button>

        <div class="subtitle">Кликни по луне</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock" class="auth-form">
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <div id="loginFields">
                <div class="login-type">
                    <label><input type="radio" name="loginType" value="email" checked /> По email</label>
                    <label><input type="radio" name="loginType" value="nickname" /> По никнейму</label>
                </div>
                <input type="text" id="loginInput" placeholder="Введите email или никнейм" />
                <input type="password" id="passwordInput" placeholder="Пароль" />
            </div>

            <div id="registerFields" class="hidden">
                <input type="email" id="regEmailInput" placeholder="Email (обязательно)" />
                <input type="text" id="regNicknameInput" placeholder="Никнейм (обязательно)" />
                <input type="password" id="regPasswordInput" placeholder="Пароль (не менее 6 символов)" />
            </div>

            <div class="buttons">
                <button id="actionBtn">Войти</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <!-- ИГРОВАЯ ЗОНА -->
        <div id="gameArea" class="game-area">
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon" id="moon"></div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div>
                <div class="counter" id="counter">0</div>
                <div class="counter-label">кликов</div>
            </div>
            <div class="player-info">
                <span class="nickname" id="nicknameDisplay">Загружаем...</span>
                <span class="time" id="timeDisplay">⏱ 0 сек</span>
            </div>
            <button class="logout-btn" id="logoutBtn">🚀 Выйти</button>
        </div>
    </div>

    <!-- ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Настройки</h2>
            <div class="confirm-text">Сбросить весь прогресс (клики и время)?</div>
            <button class="danger" id="resetProgressBtn">🗑️ Сбросить прогресс</button>
            <button class="close-btn" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  НАСТРОЙКА SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://zllnsmztaakdwjpnijsk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AHp63XmOZhgE2xYmhxFvsw_cB1urGrt';

        if (typeof window.supabase === 'undefined') {
            document.getElementById('authMessage').textContent = '⚠️ Не удалось загрузить библиотеку Supabase. Проверьте интернет.';
            throw new Error('Supabase library not loaded');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null;
        let playerData = null;
        let clickCount = 0;
        let lastClickTime = null;
        let totalSecondsPlayed = 0;
        let sessionStartTimestamp = null; // время начала сессии
        let timeUpdateInterval = null;

        // DOM-элементы
        const authBlock = document.getElementById('authBlock');
        const gameArea = document.getElementById('gameArea');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginFields = document.getElementById('loginFields');
        const registerFields = document.getElementById('registerFields');
        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const regEmailInput = document.getElementById('regEmailInput');
        const regNicknameInput = document.getElementById('regNicknameInput');
        const regPasswordInput = document.getElementById('regPasswordInput');
        const actionBtn = document.getElementById('actionBtn');
        const authMessage = document.getElementById('authMessage');
        const counterEl = document.getElementById('counter');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const moonWrapper = document.getElementById('moonWrapper');
        const clickEffect = document.getElementById('clickEffect');
        const logoutBtn = document.getElementById('logoutBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const resetProgressBtn = document.getElementById('resetProgressBtn');

        let currentMode = 'login';

        // ============================================================
        //  УПРАВЛЕНИЕ ВКЛАДКАМИ
        // ============================================================
        function setMode(mode) {
            currentMode = mode;
            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                loginFields.classList.remove('hidden');
                registerFields.classList.add('hidden');
                actionBtn.textContent = 'Войти';
                regEmailInput.value = '';
                regNicknameInput.value = '';
                regPasswordInput.value = '';
                authMessage.textContent = '';
                authMessage.className = 'error';
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                registerFields.classList.remove('hidden');
                loginFields.classList.add('hidden');
                actionBtn.textContent = 'Зарегистрироваться';
                loginInput.value = '';
                passwordInput.value = '';
                authMessage.textContent = '';
                authMessage.className = 'error';
            }
        }

        tabLogin.addEventListener('click', () => setMode('login'));
        tabRegister.addEventListener('click', () => setMode('register'));

        // ============================================================
        //  ЗВЁЗДЫ
        // ============================================================
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 300; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (без гео)
        // ============================================================
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) return 'tablet';
            if (/Mobile|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(ua)) return 'mobile';
            return 'desktop';
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', version = 'Unknown';
            if (ua.indexOf('Chrome') > -1) { browser = 'Chrome'; version = ua.match(/Chrome\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Firefox') > -1) { browser = 'Firefox'; version = ua.match(/Firefox\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Safari') > -1) { browser = 'Safari'; version = ua.match(/Version\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Edge') > -1) { browser = 'Edge'; version = ua.match(/Edge\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) { browser = 'Opera'; version = ua.match(/(Opera|OPR)\/(\d+)/)?.[2] || ''; }
            return { browser, version };
        }

        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown', version = '';
            if (ua.indexOf('Windows') > -1) { os = 'Windows'; version = ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Mac OS') > -1) { os = 'macOS'; version = ua.match(/Mac OS X (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Android') > -1) { os = 'Android'; version = ua.match(/Android (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('iOS') > -1 || ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) { os = 'iOS'; version = ua.match(/OS (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Linux') > -1) { os = 'Linux'; }
            return { os, version };
        }

        function getScreenInfo() {
            return { width: window.screen.width, height: window.screen.height, colorDepth: window.screen.colorDepth };
        }

        function getLanguage() { return navigator.language || navigator.userLanguage || 'en'; }
        function getTimezone() { return Intl.DateTimeFormat().resolvedOptions().timeZone; }

        function collectStaticDeviceData() {
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screen = getScreenInfo();
            return {
                device_type: getDeviceType(),
                browser: browser.browser,
                browser_version: browser.version,
                os: os.os,
                os_version: os.version,
                screen_width: screen.width,
                screen_height: screen.height,
                color_depth: screen.colorDepth,
                language: getLanguage(),
                timezone: getTimezone(),
                user_agent: navigator.userAgent,
                referrer: document.referrer || ''
            };
        }

        // ============================================================
        //  РАБОТА С БАЗОЙ ДАННЫХ
        // ============================================================
        async function createOrUpdatePlayer(userId, email) {
            const staticData = collectStaticDeviceData();
            const { data: existing, error: selectError } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if (selectError && selectError.code !== 'PGRST116') {
                console.error('Ошибка проверки игрока:', selectError);
                return null;
            }

            const username = currentUser?.user_metadata?.username || null;

            if (existing) {
                const { data, error } = await supabaseClient
                    .from('players')
                    .update({
                        email: email || existing.email,
                        username: username || existing.username,
                        session_count: (existing.session_count || 0) + 1,
                        current_session_start: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId)
                    .select()
                    .single();
                if (error) console.error('Ошибка обновления игрока:', error);
                return data || existing;
            } else {
                const newPlayer = {
                    id: userId,
                    email: email,
                    username: username,
                    total_clicks: 0,
                    first_click_at: new Date().toISOString(),
                    last_click_at: null,
                    session_count: 1,
                    total_seconds_played: 0,
                    current_session_start: new Date().toISOString(),
                    ...staticData,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                const { data, error } = await supabaseClient
                    .from('players')
                    .insert(newPlayer)
                    .select()
                    .single();
                if (error) {
                    console.error('Ошибка создания игрока:', error);
                    return null;
                }
                return data;
            }
        }

        async function loadPlayerData(userId) {
            const { data, error } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .single();
            if (error) {
                console.error('Ошибка загрузки данных:', error);
                return null;
            }
            return data;
        }

        async function updateClicksAndTime(playerId, newTotal, secondsAdded, clickTimestamp, x, y) {
            const updateData = {
                total_clicks: newTotal,
                last_click_at: clickTimestamp,
                total_seconds_played: totalSecondsPlayed,
                updated_at: new Date().toISOString()
            };
            const { error: updateError } = await supabaseClient
                .from('players')
                .update(updateData)
                .eq('id', playerId);
            if (updateError) console.error('Ошибка обновления players:', updateError);

            const { error: insertError } = await supabaseClient
                .from('clicks')
                .insert({
                    player_id: playerId,
                    click_time: clickTimestamp,
                    x: x,
                    y: y
                });
            if (insertError) console.error('Ошибка вставки клика:', insertError);
        }

        // ============================================================
        //  ФУНКЦИИ ОБНОВЛЕНИЯ ВРЕМЕНИ
        // ============================================================
        function getCurrentTotalSeconds() {
            if (!playerData) return 0;
            const base = playerData.total_seconds_played || 0;
            if (sessionStartTimestamp) {
                return base + (Date.now() - sessionStartTimestamp) / 1000;
            }
            return base;
        }

        function updateTimeDisplay() {
            if (!playerData) return;
            const totalSec = Math.floor(getCurrentTotalSeconds());
            const mins = Math.floor(totalSec / 60);
            const secs = totalSec % 60;
            let timeStr = '';
            if (mins > 0) timeStr += mins + ' мин ';
            if (secs > 0 || mins === 0) timeStr += secs + ' сек';
            if (timeStr === '') timeStr = '0 сек';
            timeDisplay.textContent = '⏱ ' + timeStr;
        }

        // ============================================================
        //  ОСНОВНАЯ ЛОГИКА ИГРЫ
        // ============================================================
        function updateUI() {
            counterEl.textContent = clickCount;
            counterEl.style.transform = 'scale(1.1)';
            setTimeout(() => { counterEl.style.transform = 'scale(1)'; }, 100);

            if (playerData && currentUser) {
                const displayName = playerData.username || currentUser.email || 'anon';
                nicknameDisplay.textContent = displayName;
                updateTimeDisplay();
            }
        }

        async function handleClick(e) {
            if (!currentUser) return;
            const rect = moonWrapper.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            const now = Date.now();
            const nowISO = new Date(now).toISOString();

            // Сначала сохраняем текущее общее время (с учётом сессии)
            const currentTotal = getCurrentTotalSeconds();
            let secondsAdded = 0;
            if (lastClickTime) {
                secondsAdded = (now - lastClickTime) / 1000;
            }
            // Обновляем общее время
            totalSecondsPlayed = currentTotal + secondsAdded;
            // Сбрасываем сессию, чтобы не учитывать время дважды
            sessionStartTimestamp = now;

            lastClickTime = now;
            clickCount++;
            updateUI();

            // Эффект клика
            clickEffect.classList.remove('active');
            void clickEffect.offsetWidth;
            clickEffect.classList.add('active');
            moonWrapper.style.transform = 'scale(0.92)';
            setTimeout(() => { moonWrapper.style.transform = 'scale(1)'; }, 150);

            // Сохраняем в БД
            await updateClicksAndTime(currentUser.id, clickCount, secondsAdded, nowISO, x, y);
        }

        // ============================================================
        //  АВТОРИЗАЦИЯ И ВЫХОД
        // ============================================================

        async function signIn(login, password, loginType) {
            authMessage.textContent = '';
            let email = login;

            if (loginType === 'nickname') {
                const { data, error } = await supabaseClient
                    .from('players')
                    .select('email')
                    .eq('username', login)
                    .maybeSingle();
                if (error || !data || !data.email) {
                    authMessage.textContent = '❌ Пользователь с таким никнеймом не найден.';
                    return false;
                }
                email = data.email;
            } else {
                if (!login.includes('@')) {
                    authMessage.textContent = '❌ Введите корректный email.';
                    return false;
                }
                email = login;
            }

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                authMessage.textContent = '❌ ' + error.message;
                return false;
            }
            return true;
        }

        async function signUp(email, password, nickname) {
            authMessage.textContent = '';
            if (!email || !password || !nickname) {
                authMessage.textContent = '❌ Все поля обязательны для заполнения.';
                return false;
            }
            if (password.length < 6) {
                authMessage.textContent = '❌ Пароль должен быть не менее 6 символов.';
                return false;
            }
            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: { username: nickname }
                }
            });
            if (error) {
                authMessage.textContent = '❌ ' + error.message;
                return false;
            }

            const user = data.user;
            if (user && !user.confirmed_at) {
                authMessage.textContent = '📧 На вашу почту отправлено письмо с подтверждением. Пожалуйста, подтвердите email, затем войдите.';
                authMessage.className = 'success';
            } else {
                authMessage.textContent = '✅ Регистрация успешна! Теперь войдите.';
                authMessage.className = 'success';
            }
            return true;
        }

        async function signOut() {
            if (timeUpdateInterval) {
                clearInterval(timeUpdateInterval);
                timeUpdateInterval = null;
            }
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ВХОДА
        // ============================================================
        async function onUserLoggedIn(user) {
            currentUser = user;
            authBlock.style.display = 'none';
            gameArea.classList.add('active');

            const email = user.email;
            const updatedPlayer = await createOrUpdatePlayer(user.id, email);
            if (updatedPlayer) {
                playerData = updatedPlayer;
                clickCount = playerData.total_clicks || 0;
                totalSecondsPlayed = playerData.total_seconds_played || 0;
                lastClickTime = playerData.last_click_at ? new Date(playerData.last_click_at).getTime() : null;
                // Запоминаем время начала сессии
                sessionStartTimestamp = Date.now();
                updateUI();

                if (timeUpdateInterval) clearInterval(timeUpdateInterval);
                timeUpdateInterval = setInterval(updateTimeDisplay, 1000);
                updateTimeDisplay();
            } else {
                const loaded = await loadPlayerData(user.id);
                if (loaded) {
                    playerData = loaded;
                    clickCount = loaded.total_clicks || 0;
                    totalSecondsPlayed = loaded.total_seconds_played || 0;
                    lastClickTime = loaded.last_click_at ? new Date(loaded.last_click_at).getTime() : null;
                    sessionStartTimestamp = Date.now();
                    updateUI();
                    if (timeUpdateInterval) clearInterval(timeUpdateInterval);
                    timeUpdateInterval = setInterval(updateTimeDisplay, 1000);
                    updateTimeDisplay();
                } else {
                    authMessage.textContent = '⚠️ Ошибка загрузки профиля.';
                }
            }
        }

        // ============================================================
        //  СБРОС ПРОГРЕССА
        // ============================================================
        async function resetProgress() {
            if (!currentUser) return;
            const confirmed = confirm('Вы уверены, что хотите сбросить весь прогресс (клики и время)? Это действие необратимо.');
            if (!confirmed) return;

            try {
                // Удаляем все клики пользователя
                const { error: deleteError } = await supabaseClient
                    .from('clicks')
                    .delete()
                    .eq('player_id', currentUser.id);
                if (deleteError) throw deleteError;

                // Обнуляем total_clicks и total_seconds_played в players
                const { error: updateError } = await supabaseClient
                    .from('players')
                    .update({
                        total_clicks: 0,
                        total_seconds_played: 0,
                        last_click_at: null,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', currentUser.id);
                if (updateError) throw updateError;

                // Обновляем локальные данные
                playerData.total_clicks = 0;
                playerData.total_seconds_played = 0;
                playerData.last_click_at = null;
                clickCount = 0;
                totalSecondsPlayed = 0;
                lastClickTime = null;
                sessionStartTimestamp = Date.now();
                updateUI();

                alert('✅ Прогресс сброшен!');
            } catch (error) {
                console.error('Ошибка сброса:', error);
                alert('❌ Не удалось сбросить прогресс: ' + error.message);
            }
        }

        // ============================================================
        //  ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        actionBtn.addEventListener('click', async () => {
            if (currentMode === 'login') {
                const login = loginInput.value.trim();
                const password = passwordInput.value.trim();
                if (!login || !password) {
                    authMessage.textContent = '❌ Заполните все поля.';
                    return;
                }
                const loginType = document.querySelector('input[name="loginType"]:checked').value;
                const ok = await signIn(login, password, loginType);
                if (ok) {
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    if (user) await onUserLoggedIn(user);
                }
            } else {
                const email = regEmailInput.value.trim();
                const nickname = regNicknameInput.value.trim();
                const password = regPasswordInput.value.trim();
                await signUp(email, password, nickname);
            }
        });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    actionBtn.click();
                }
            });
        });

        logoutBtn.addEventListener('click', signOut);

        moonWrapper.addEventListener('click', handleClick);
        moonWrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const rect = moonWrapper.getBoundingClientRect();
                const fakeEvent = { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 };
                handleClick(fakeEvent);
            }
        });
        moonWrapper.setAttribute('tabindex', '0');
        moonWrapper.setAttribute('role', 'button');

        // ---------- НАСТРОЙКИ ----------
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });

        resetProgressBtn.addEventListener('click', resetProgress);

        // ============================================================
        //  ПРОВЕРКА АУТЕНТИФИКАЦИИ ПРИ ЗАГРУЗКЕ
        // ============================================================
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                await onUserLoggedIn(session.user);
            } else {
                authBlock.style.display = 'block';
                gameArea.classList.remove('active');
                setMode('login');
            }
        }
        init();
    </script>
