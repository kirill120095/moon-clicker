<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        /* ---------- ГЛОБАЛЬНЫЙ ФОН ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ---------- ГАЛАКТИКА ---------- */
        .galaxy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #0d1b2a, #1b1f3a 60%, #0b0e1a);
            overflow: hidden;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 180, 100, 0.2);
            animation: orbit linear infinite;
            pointer-events: none;
        }
        .planet::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            top: 15%;
            left: 20%;
        }
        .planet-1 {
            width: 60px; height: 60px;
            top: 15%; left: 85%;
            background: radial-gradient(circle at 30% 30%, #ffb07c, #d98c5f);
            animation-duration: 25s;
            animation-name: orbit1;
            box-shadow: 0 0 60px rgba(255, 150, 80, 0.2);
        }
        .planet-2 {
            width: 40px; height: 40px;
            top: 75%; left: 10%;
            background: radial-gradient(circle at 30% 30%, #8fc7ff, #4a7db5);
            animation-duration: 35s;
            animation-name: orbit2;
            box-shadow: 0 0 50px rgba(100, 180, 255, 0.2);
        }
        @keyframes orbit1 {
            0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            0% { transform: rotate(0deg) translateX(-180px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(-180px) rotate(-360deg); }
        }
        @media (max-width: 600px) {
            .planet-1 { width: 40px; height: 40px; }
            .planet-2 { width: 30px; height: 30px; }
            @keyframes orbit1 {
                0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
            }
            @keyframes orbit2 {
                0% { transform: rotate(0deg) translateX(-90px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(-90px) rotate(-360deg); }
            }
        }

        /* ---------- КОНТЕЙНЕР ---------- */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 50px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 80px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 700px;
            width: 100%;
            transition: all 0.5s ease;
        }
        /* Красный режим для кровавой луны */
        .container.blood-mode {
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2), 0 20px 60px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 0, 0, 0.2);
        }
        .container.blood-mode .subtitle {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        /* ---------- ЗАГОЛОВОК ---------- */
        .subtitle {
            font-size: 2.8rem;
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(255, 215, 150, 0.15);
            margin-bottom: 25px;
            transition: all 0.5s ease;
        }

        /* ---------- ШЕСТЕРЁНКА ---------- */
        .settings-icon {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            z-index: 10;
            background: none;
            border: none;
            line-height: 1;
        }
        .settings-icon:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: rotate(60deg);
        }

        /* ---------- ФОРМА АВТОРИЗАЦИИ ---------- */
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 40px;
        }
        .auth-form .row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form .row input {
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #f0e6d0;
            font-size: 1.0rem;
            outline: none;
            transition: border 0.3s;
            width: 100%;
        }
        .auth-form .row input:focus {
            border-color: rgba(255, 215, 150, 0.5);
        }
        .auth-form .row input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .auth-form .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .auth-form button {
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border: 1px solid rgba(255, 215, 150, 0.2);
        }
        .auth-form button:hover {
            background: rgba(255, 215, 150, 0.25);
            transform: scale(1.03);
        }
        .auth-form .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .hidden {
            display: none !important;
        }

        /* ---------- ИГРОВАЯ ЗОНА ---------- */
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }

        /* ---------- ЛУНА ---------- */
        .moon-wrapper {
            display: inline-block;
            cursor: pointer;
            position: relative;
            margin: 20px 0;
            width: 340px;
            height: 340px;
            transition: transform 0.2s ease;
        }
        .moon-wrapper:hover {
            transform: scale(1.08);
        }
        .moon-wrapper:active {
            transform: scale(0.92);
        }

        .moon {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f5f0e8, #c8bda8 60%, #8a7e6b);
            background-size: cover;
            background-position: center;
            box-shadow:
                0 0 60px rgba(255, 215, 150, 0.4),
                0 0 120px rgba(255, 215, 150, 0.2),
                inset -35px -35px 90px rgba(0, 0, 0, 0.4),
                inset 35px 35px 90px rgba(255, 255, 255, 0.3);
            position: relative;
            animation: moonOrbit 30s linear infinite, pulseGlow 4s ease-in-out infinite alternate;
            transition: box-shadow 0.5s ease;
        }
        /* Красный режим для луны */
        .container.blood-mode .moon {
            box-shadow:
                0 0 60px rgba(255, 0, 0, 0.6),
                0 0 120px rgba(255, 0, 0, 0.3),
                inset -35px -35px 90px rgba(0, 0, 0, 0.4),
                inset 35px 35px 90px rgba(255, 0, 0, 0.2);
        }
        @keyframes moonOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 40px rgba(255,215,150,0.3), 0 0 80px rgba(255,215,150,0.1), inset -35px -35px 90px rgba(0,0,0,0.4), inset 35px 35px 90px rgba(255,255,255,0.3); }
            100% { box-shadow: 0 0 100px rgba(255,215,150,0.6), 0 0 200px rgba(255,215,150,0.3), inset -35px -35px 90px rgba(0,0,0,0.5), inset 35px 35px 90px rgba(255,255,255,0.4); }
        }
        /* Красная пульсация */
        .container.blood-mode .moon {
            animation: moonOrbit 30s linear infinite, pulseGlowRed 4s ease-in-out infinite alternate;
        }
        @keyframes pulseGlowRed {
            0% { box-shadow: 0 0 40px rgba(255,0,0,0.4), 0 0 80px rgba(255,0,0,0.2), inset -35px -35px 90px rgba(0,0,0,0.4), inset 35px 35px 90px rgba(255,0,0,0.2); }
            100% { box-shadow: 0 0 100px rgba(255,0,0,0.8), 0 0 200px rgba(255,0,0,0.4), inset -35px -35px 90px rgba(0,0,0,0.5), inset 35px 35px 90px rgba(255,0,0,0.3); }
        }

        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 150, 0.6), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .click-effect.active {
            animation: flash 0.4s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
        }
        /* Красный эффект клика */
        .container.blood-mode .click-effect {
            background: radial-gradient(circle, rgba(255, 0, 0, 0.8), transparent 70%);
        }

        /* ---------- СЧЁТЧИК ---------- */
        .counter {
            margin: 12px 0 5px;
            color: #f0e6d0;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 215, 150, 0.2);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 35px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 160px;
            transition: all 0.5s ease;
        }
        .container.blood-mode .counter {
            color: #ff6b6b;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        /* ---------- ИНФО ---------- */
        .player-info {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
            margin-top: 10px;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .player-info .nickname {
            color: rgba(255, 255, 255, 0.5);
        }
        .player-info .time {
            color: rgba(255, 215, 150, 0.5);
        }
        .container.blood-mode .player-info .time {
            color: #ff6b6b;
        }

        /* ---------- КНОПКА ВЫХОДА ---------- */
        .logout-btn {
            margin-top: 18px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.0rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .logout-btn:active {
            transform: scale(0.95);
        }

        /* ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1f35;
            border-radius: 30px;
            padding: 30px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.6rem;
        }
        .modal .section-title {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            text-align: left;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        .modal .bg-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .modal .bg-options button {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #f0e6d0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal .bg-options button:hover {
            background: rgba(255,215,150,0.15);
            border-color: rgba(255,215,150,0.3);
        }
        .modal .bg-options button.active {
            background: rgba(255,215,150,0.25);
            border-color: rgba(255,215,150,0.5);
        }
        .modal .auth-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .modal .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .modal .tabs button {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .modal .tabs button.active {
            background: rgba(255,215,150,0.15);
            color: #f0e6d0;
            border-color: rgba(255,215,150,0.3);
        }
        .modal .tabs button:hover {
            background: rgba(255,215,150,0.1);
        }
        .modal .auth-form input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #f0e6d0;
            font-size: 0.9rem;
            outline: none;
        }
        .modal .auth-form input:focus {
            border-color: rgba(255,215,150,0.5);
        }
        .modal .auth-form input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .modal .auth-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,150,0.2);
            background: rgba(255,215,150,0.15);
            color: #f0e6d0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal .auth-btn:hover {
            background: rgba(255,215,150,0.25);
        }
        .modal .btn-danger {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 15px 0 8px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 80, 80, 0.15);
            color: #ff6b6b;
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 80, 80, 0.2);
        }
        .modal .btn-danger:hover {
            background: rgba(255, 80, 80, 0.25);
            transform: scale(1.02);
        }
        .modal .close-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .modal .close-btn:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        /* ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- */
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .confirm-overlay.active {
            display: flex;
        }
        .confirm-box {
            background: #1a1f35;
            border-radius: 30px;
            padding: 30px 40px;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            text-align: center;
        }
        .confirm-box p {
            color: #f0e6d0;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .confirm-box .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .confirm-box .buttons button {
            padding: 10px 30px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            min-width: 100px;
        }
        .confirm-box .btn-yes {
            background: rgba(255, 80, 80, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 80, 80, 0.3);
        }
        .confirm-box .btn-yes:hover {
            background: rgba(255, 80, 80, 0.3);
            transform: scale(1.05);
        }
        .confirm-box .btn-no {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .confirm-box .btn-no:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 700px) {
            .container { padding: 30px; max-width: 100%; }
            .moon-wrapper { width: 260px; height: 260px; }
            .counter { font-size: 2.8rem; padding: 8px 20px; min-width: 120px; }
            .subtitle { font-size: 2rem; letter-spacing: 4px; }
            .settings-icon { font-size: 1.6rem; top: 15px; right: 18px; }
            .planet-1 { width: 40px; height: 40px; }
            .planet-2 { width: 30px; height: 30px; }
        }
        @media (max-width: 450px) {
            .moon-wrapper { width: 200px; height: 200px; }
            .counter { font-size: 2.2rem; padding: 6px 15px; min-width: 90px; }
            .subtitle { font-size: 1.6rem; }
            .container { padding: 20px; }
            .modal { padding: 20px 25px; }
        }
    </style>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <button class="settings-icon" id="settingsBtn" title="Настройки">⚙️</button>
        <div class="subtitle">Кликни по луне</div>

        <!-- ИГРОВАЯ ЗОНА -->
        <div id="gameArea" class="game-area">
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon" id="moon"></div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div>
                <div class="counter" id="counter">0</div>
            </div>
            <div class="player-info">
                <span class="nickname" id="nicknameDisplay">Загружаем...</span>
                <span class="time" id="timeDisplay">⏱ 0 ч</span>
            </div>
            <button class="logout-btn" id="logoutBtn">🚀 Выйти</button>
        </div>
    </div>

    <!-- ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Настройки</h2>
            
            <div class="section-title">⏱️ Общее время</div>
            <div class="player-info" style="justify-content: center; margin-bottom: 15px;">
                <span class="time" id="totalTimeDisplay" style="color: rgba(255, 215, 150, 0.7); font-size: 1rem;">0 ч</span>
            </div>

            <div class="section-title">🎨 Фон луны</div>
            <div class="bg-options" id="bgOptions">
                <button data-bg="normal">⚪ Обычная</button>
                <button data-bg="blood">🔴 Кровавая</button>
            </div>

            <div class="auth-section">
                <h3 style="color: #f0e6d0; font-size: 1.2rem; margin-bottom: 15px;">👤 Аккаунт</h3>
                <div class="tabs" id="authTabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>

                <div id="loginForm" class="auth-form active">
                    <div style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; gap: 6px; justify-content: center; cursor: pointer;">
                            <input type="radio" name="loginType" value="email" checked style="accent-color: #f0e6d0;" />
                            По email
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; justify-content: center; cursor: pointer; margin-top: 5px;">
                            <input type="radio" name="loginType" value="nickname" style="accent-color: #f0e6d0;" />
                            По логину
                        </label>
                    </div>
                    <input type="text" id="loginInput" placeholder="Логин или email" />
                    <input type="password" id="passwordInput" placeholder="Пароль" />
                    <button class="auth-btn" id="loginBtn">Войти</button>
                    <div id="loginMessage" class="error" style="margin-top: 8px;"></div>
                </div>

                <div id="registerForm" class="auth-form hidden">
                    <input type="email" id="regEmailInput" placeholder="Email (обязательно)" />
                    <input type="text" id="regNicknameInput" placeholder="Логин (обязательно)" />
                    <input type="password" id="regPasswordInput" placeholder="Пароль (минимум 6 символов)" />
                    <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
                    <div id="registerMessage" class="error" style="margin-top: 8px;"></div>
                </div>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="section-title">🗑️ Прогресс</div>
                <button class="btn-danger" id="resetProgressBtn">Сбросить прогресс</button>
            </div>

            <button class="close-btn" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

    <!-- ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Вы уверены, что хотите сбросить весь прогресс? Это действие необратимо.</p>
            <div class="buttons">
                <button class="btn-yes" id="confirmYes">Да</button>
                <button class="btn-no" id="confirmNo">Нет</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  НАСТРОЙКА SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://zllnsmztaakdwjpnijsk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AHp63XmOZhgE2xYmhxFvsw_cB1urGrt';

        if (typeof window.supabase === 'undefined') {
            alert('⚠️ Не удалось загрузить библиотеку Supabase. Проверьте интернет.');
            throw new Error('Supabase library not loaded');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null;
        let playerData = null;
        let clickCount = 0;
        let totalSecondsPlayed = 0;
        let sessionStartTimestamp = null;
        let timeUpdateInterval = null;
        let autoSaveInterval = null;

        // DOM-элементы
        const gameArea = document.getElementById('gameArea');
        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const regEmailInput = document.getElementById('regEmailInput');
        const regNicknameInput = document.getElementById('regNicknameInput');
        const regPasswordInput = document.getElementById('regPasswordInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loginMessage = document.getElementById('loginMessage');
        const registerMessage = document.getElementById('registerMessage');
        const counterEl = document.getElementById('counter');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const totalTimeDisplay = document.getElementById('totalTimeDisplay');
        const moonWrapper = document.getElementById('moonWrapper');
        const clickEffect = document.getElementById('clickEffect');
        const logoutBtn = document.getElementById('logoutBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        const bgOptions = document.getElementById('bgOptions');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');
        const authTabs = document.getElementById('authTabs');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        // ============================================================
        //  ФОРМАТИРОВАНИЕ ВРЕМЕНИ
        // ============================================================
        function formatTime(seconds) {
            if (seconds < 60) return `${seconds} сек`;
            
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} мин`;
            
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} ч`;
            
            const days = Math.floor(hours / 24);
            return `${days} дн`;
        }

        // ============================================================
        //  УПРАВЛЕНИЕ ВКЛАДКАМИ АВТОРИЗАЦИИ
        // ============================================================
        authTabs.addEventListener('click', (e) => {
            if (!e.target.classList.contains('auth-tab')) return;
            
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
            e.target.classList.add('active');
            
            if (e.target.dataset.tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.add('hidden');
                loginMessage.textContent = '';
            } else {
                registerForm.classList.remove('hidden');
                loginForm.classList.remove('active');
                registerMessage.textContent = '';
            }
        });

        // ============================================================
        //  ЗВЁЗДЫ
        // ============================================================
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 300; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) return 'tablet';
            if (/Mobile|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(ua)) return 'mobile';
            return 'desktop';
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', version = 'Unknown';
            if (ua.indexOf('Chrome') > -1) { browser = 'Chrome'; version = ua.match(/Chrome\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Firefox') > -1) { browser = 'Firefox'; version = ua.match(/Firefox\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Safari') > -1) { browser = 'Safari'; version = ua.match(/Version\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Edge') > -1) { browser = 'Edge'; version = ua.match(/Edge\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) { browser = 'Opera'; version = ua.match(/(Opera|OPR)\/(\d+)/)?.[2] || ''; }
            return { browser, version };
        }

        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown', version = '';
            if (ua.indexOf('Windows') > -1) { os = 'Windows'; version = ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Mac OS') > -1) { os = 'macOS'; version = ua.match(/Mac OS X (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Android') > -1) { os = 'Android'; version = ua.match(/Android (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('iOS') > -1 || ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) { os = 'iOS'; version = ua.match(/OS (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Linux') > -1) { os = 'Linux'; }
            return { os, version };
        }

        function getScreenInfo() {
            return { width: window.screen.width, height: window.screen.height, colorDepth: window.screen.colorDepth };
        }

        function getLanguage() { return navigator.language || navigator.userLanguage || 'en'; }
        function getTimezone() { return Intl.DateTimeFormat().resolvedOptions().timeZone; }

        function collectStaticDeviceData() {
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screen = getScreenInfo();
            return {
                device_type: getDeviceType(),
                browser: browser.browser,
                browser_version: browser.version,
                os: os.os,
                os_version: os.version,
                screen_width: screen.width,
                screen_height: screen.height,
                color_depth: screen.colorDepth,
                language: getLanguage(),
                timezone: getTimezone(),
                user_agent: navigator.userAgent,
                referrer: document.referrer || ''
            };
        }

        // ============================================================
        //  РАБОТА С БАЗОЙ ДАННЫХ
        // ============================================================
        async function createOrUpdatePlayer(userId, email) {
            const staticData = collectStaticDeviceData();
            const { data: existing, error: selectError } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if (selectError && selectError.code !== 'PGRST116') {
                console.error('Ошибка проверки игрока:', selectError);
                return null;
            }

            const username = currentUser?.user_metadata?.username || null;

            if (existing) {
                const { data, error } = await supabaseClient
                    .from('players')
                    .update({
                        email: email || existing.email,
                        username: username || existing.username,
                        session_count: (existing.session_count || 0) + 1,
                        current_session_start: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId)
                    .select()
                    .single();
                if (error) console.error('Ошибка обновления игрока:', error);
                return data || existing;
            } else {
                const newPlayer = {
                    id: userId,
                    email: email,
                    username: username,
                    total_clicks: 0,
                    first_click_at: new Date().toISOString(),
                    last_click_at: null,
                    session_count: 1,
                    total_seconds_played: 0,
                    current_session_start: new Date().toISOString(),
                    ...staticData,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                const { data, error } = await supabaseClient
                    .from('players')
                    .insert(newPlayer)
                    .select()
                    .single();
                if (error) {
                    console.error('Ошибка создания игрока:', error);
                    return null;
                }
                return data;
            }
        }

        async function loadPlayerData(userId) {
            const { data, error } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .single();
            if (error) {
                console.error('Ошибка загрузки данных:', error);
                return null;
            }
            return data;
        }

        async function updateClicksAndTime(playerId, newTotal, clickTimestamp, x, y) {
            const updateData = {
                total_clicks: newTotal,
                last_click_at: clickTimestamp,
                total_seconds_played: totalSecondsPlayed,
                updated_at: new Date().toISOString()
            };
            const { error: updateError } = await supabaseClient
                .from('players')
                .update(updateData)
                .eq('id', playerId);
            if (updateError) console.error('Ошибка обновления players:', updateError);

            const { error: insertError } = await supabaseClient
                .from('clicks')
                .insert({
                    player_id: playerId,
                    click_time: clickTimestamp,
                    x: x,
                    y: y
                });
            if (insertError) console.error('Ошибка вставки клика:', insertError);
        }

        async function saveTimeOnly() {
            if (!currentUser || !playerData) return;
            const { error } = await supabaseClient
                .from('players')
                .update({
                    total_seconds_played: totalSecondsPlayed,
                    updated_at: new Date().toISOString()
                })
                .eq('id', currentUser.id);
            if (error) console.error('Ошибка сохранения времени:', error);
        }

        async function resetPlayerProgress(playerId) {
            const { error } = await supabaseClient
                .from('players')
                .update({
                    total_clicks: 0,
                    total_seconds_played: 0,
                    first_click_at: new Date().toISOString(),
                    last_click_at: null,
                    updated_at: new Date().toISOString()
                })
                .eq('id', playerId);
            
            if (!error) {
                await supabaseClient
                    .from('clicks')
                    .delete()
                    .eq('player_id', playerId);
            }
            return !error;
        }

        // ============================================================
        //  УПРАВЛЕНИЕ ВРЕМЕНЕМ И ОТОБРАЖЕНИЕМ
        // ============================================================
        function updateTimeDisplay() {
            const now = Date.now();
            const elapsedMs = now - sessionStartTimestamp;
            const elapsedSeconds = Math.floor(elapsedMs / 1000);
            totalSecondsPlayed = (playerData?.total_seconds_played || 0) + elapsedSeconds;
            const formatted = formatTime(totalSecondsPlayed);
            timeDisplay.textContent = `⏱ ${formatted}`;
            totalTimeDisplay.textContent = formatted;
        }

        function startTimeTracking() {
            sessionStartTimestamp = Date.now();
            if (timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(updateTimeDisplay, 1000);
            updateTimeDisplay();
        }

        function stopTimeTracking() {
            if (timeUpdateInterval) {
                clearInterval(timeUpdateInterval);
                timeUpdateInterval = null;
            }
        }

        // ============================================================
        //  КЛИК ПО ЛУНЕ
        // ============================================================
        async function handleMoonClick(e) {
            if (!currentUser) return;

            clickCount++;
            const rect = moonWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            counterEl.textContent = clickCount;
            clickEffect.classList.remove('active');
            void clickEffect.offsetWidth;
            clickEffect.classList.add('active');

            const clickTimestamp = new Date().toISOString();
            await updateClicksAndTime(currentUser.id, clickCount, clickTimestamp, x, y);
        }

        moonWrapper.addEventListener('click', handleMoonClick);

        // ============================================================
        //  АВТОСОХРАНЕНИЕ ПРОГРЕССА
        // ============================================================
        function startAutoSave() {
            if (autoSaveInterval) clearInterval(autoSaveInterval);
            autoSaveInterval = setInterval(async () => {
                if (currentUser && playerData) {
                    await saveTimeOnly();
                }
            }, 5000);
        }

        function stopAutoSave() {
            if (autoSaveInterval) {
                clearInterval(autoSaveInterval);
                autoSaveInterval = null;
            }
        }

        // ============================================================
        //  АВТОРИЗАЦИЯ
        // ============================================================
        async function handleLogin() {
            const loginType = document.querySelector('input[name="loginType"]:checked').value;
            const identifier = loginInput.value.trim();
            const password = passwordInput.value.trim();

            if (!identifier || !password) {
                loginMessage.textContent = '❌ Заполните все поля';
                loginMessage.className = 'error';
                return;
            }

            loginMessage.textContent = 'Входим...';
            loginMessage.className = '';

            try {
                let response;
                if (loginType === 'email') {
                    response = await supabaseClient.auth.signInWithPassword({
                        email: identifier,
                        password: password
                    });
                } else {
                    const { data: players } = await supabaseClient
                        .from('players')
                        .select('id')
                        .eq('username', identifier)
                        .single();

                    if (!players) throw new Error('Пользователь не найден');
                    
                    const { data: authData } = await supabaseClient.auth.admin.getUserById(players.id);
                    if (!authData?.user) throw new Error('Ошибка авторизации');

                    response = await supabaseClient.auth.signInWithPassword({
                        email: authData.user.email,
                        password: password
                    });
                }

                if (response.error) throw response.error;

                currentUser = response.data.user;
                playerData = await createOrUpdatePlayer(currentUser.id, currentUser.email);

                if (!playerData) throw new Error('Ошибка загрузки данных игрока');

                clickCount = playerData.total_clicks || 0;
                counterEl.textContent = clickCount;
                nicknameDisplay.textContent = playerData.username || currentUser.email;

                startTimeTracking();
                startAutoSave();

                settingsModal.classList.remove('active');
                gameArea.classList.add('active');
                loginInput.value = '';
                passwordInput.value = '';
            } catch (error) {
                loginMessage.textContent = '❌ ' + (error.message || 'Ошибка входа');
                loginMessage.className = 'error';
            }
        }

        async function handleRegister() {
            const email = regEmailInput.value.trim();
            const nickname = regNicknameInput.value.trim();
            const password = regPasswordInput.value.trim();

            if (!email || !nickname || !password) {
                registerMessage.textContent = '❌ Заполните все поля';
                registerMessage.className = 'error';
                return;
            }
            if (password.length < 6) {
                registerMessage.textContent = '❌ Пароль должен быть минимум 6 символов';
                registerMessage.className = 'error';
                return;
            }

            registerMessage.textContent = 'Регистрируем...';
            registerMessage.className = '';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { username: nickname }
                    }
                });

                if (error) throw error;

                currentUser = data.user;
                playerData = await createOrUpdatePlayer(currentUser.id, currentUser.email);

                if (!playerData) throw new Error('Ошибка создания профиля');

                clickCount = 0;
                counterEl.textContent = clickCount;
                nicknameDisplay.textContent = nickname;

                startTimeTracking();
                startAutoSave();

                settingsModal.classList.remove('active');
                gameArea.classList.add('active');
                regEmailInput.value = '';
                regNicknameInput.value = '';
                regPasswordInput.value = '';
            } catch (error) {
                registerMessage.textContent = '❌ ' + (error.message || 'Ошибка регистрации');
                registerMessage.className = 'error';
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        registerBtn.addEventListener('click', handleRegister);

        loginInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        regPasswordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });

        // ============================================================
        //  ВЫХОД
        // ============================================================
        async function handleLogout() {
            stopTimeTracking();
            stopAutoSave();

            if (currentUser && playerData) {
                await saveTimeOnly();
            }

            await supabaseClient.auth.signOut();

            currentUser = null;
            playerData = null;
            clickCount = 0;
            totalSecondsPlayed = 0;

            gameArea.classList.remove('active');
            settingsModal.classList.remove('active');
        }

        logoutBtn.addEventListener('click', handleLogout);

        // ============================================================
        //  НАСТРОЙКИ
        // ============================================================
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        bgOptions.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('.bg-options button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');

                const bg = e.target.dataset.bg;
                if (bg === 'blood') {
                    document.getElementById('app').classList.add('blood-mode');
                    localStorage.setItem('moonMode', 'blood');
                } else {
                    document.getElementById('app').classList.remove('blood-mode');
                    localStorage.setItem('moonMode', 'normal');
                }
            }
        });

        resetProgressBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('active');
        });

        confirmYes.addEventListener('click', async () => {
            if (currentUser && playerData) {
                const success = await resetPlayerProgress(currentUser.id);
                if (success) {
                    clickCount = 0;
                    totalSecondsPlayed = 0;
                    counterEl.textContent = '0';
                    updateTimeDisplay();
                    confirmOverlay.classList.remove('active');
                }
            }
        });

        confirmNo.addEventListener('click', () => {
            confirmOverlay.classList.remove('active');
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                currentUser = session.user;
                playerData = await loadPlayerData(currentUser.id);

                if (playerData) {
                    clickCount = playerData.total_clicks || 0;
                    counterEl.textContent = clickCount;
                    nicknameDisplay.textContent = playerData.username || currentUser.email;
                    totalSecondsPlayed = playerData.total_seconds_played || 0;
                    updateTimeDisplay();

                    startTimeTracking();
                    startAutoSave();

                    gameArea.classList.add('active');
                }
            }

            const savedMode = localStorage.getItem('moonMode');
            if (savedMode === 'blood') {
                document.getElementById('app').classList.add('blood-mode');
                document.querySelector('[data-bg="blood"]').classList.add('active');
            } else {
                document.querySelector('[data-bg="normal"]').classList.add('active');
            }
        }

        init();
    </script>
</body>
</html>
