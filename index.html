<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        /* ---------- ГЛОБАЛЬНЫЙ ФОН ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ---------- ГАЛАКТИКА ---------- */
        .galaxy {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #0d1b2a, #1b1f3a 60%, #0b0e1a);
            overflow: hidden;
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 180, 100, 0.2);
            animation: orbit linear infinite;
            pointer-events: none;
        }
        .planet::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            top: 15%;
            left: 20%;
        }
        .planet-1 {
            width: 60px; height: 60px;
            top: 15%; left: 85%;
            background: radial-gradient(circle at 30% 30%, #ffb07c, #d98c5f);
            animation-duration: 25s;
            animation-name: orbit1;
            box-shadow: 0 0 60px rgba(255, 150, 80, 0.2);
        }
        .planet-2 {
            width: 40px; height: 40px;
            top: 75%; left: 10%;
            background: radial-gradient(circle at 30% 30%, #8fc7ff, #4a7db5);
            animation-duration: 35s;
            animation-name: orbit2;
            box-shadow: 0 0 50px rgba(100, 180, 255, 0.2);
        }
        @keyframes orbit1 {
            0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }
        @keyframes orbit2 {
            0% { transform: rotate(0deg) translateX(-180px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(-180px) rotate(-360deg); }
        }
        @media (max-width: 600px) {
            .planet-1 { width: 40px; height: 40px; }
            .planet-2 { width: 30px; height: 30px; }
            @keyframes orbit1 {
                0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
            }
            @keyframes orbit2 {
                0% { transform: rotate(0deg) translateX(-90px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(-90px) rotate(-360deg); }
            }
        }

        /* ---------- КОНТЕЙНЕР ---------- */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 50px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 80px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 700px;
            width: 100%;
            transition: all 0.5s ease;
        }
        /* Красный режим для кровавой луны */
        .container.blood-mode {
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2), 0 20px 60px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 0, 0, 0.2);
        }
        .container.blood-mode .subtitle {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        /* ---------- ЗАГОЛОВОК ---------- */
        .subtitle {
            font-size: 2.8rem;
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(255, 215, 150, 0.15);
            margin-bottom: 25px;
            transition: all 0.5s ease;
        }

        /* ---------- ШЕСТЕРЁНКА ---------- */
        .settings-icon {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.3);
            transition: 0.3s;
            z-index: 10;
            background: none;
            border: none;
            line-height: 1;
        }
        .settings-icon:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: rotate(60deg);
        }

        /* ---------- ФОРМА АВТОРИЗАЦИИ ---------- */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 40px;
        }
        .auth-form .tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .auth-form .tabs button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.0rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .auth-form .tabs button.active {
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border-color: rgba(255, 215, 150, 0.3);
        }
        .auth-form .tabs button:hover {
            background: rgba(255, 215, 150, 0.1);
        }
        .auth-form .login-type {
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .auth-form .login-type label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .auth-form .login-type input[type="radio"] {
            accent-color: #f0e6d0;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .auth-form .row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form .row input {
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #f0e6d0;
            font-size: 1.0rem;
            outline: none;
            transition: border 0.3s;
            width: 100%;
        }
        .auth-form .row input:focus {
            border-color: rgba(255, 215, 150, 0.5);
        }
        .auth-form .row input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .auth-form .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .auth-form button {
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border: 1px solid rgba(255, 215, 150, 0.2);
        }
        .auth-form button:hover {
            background: rgba(255, 215, 150, 0.25);
            transform: scale(1.03);
        }
        .auth-form .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .hidden {
            display: none !important;
        }

        /* ---------- ИГРОВАЯ ЗОНА ---------- */
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }

        /* ---------- ЛУНА ---------- */
        .moon-wrapper {
            display: inline-block;
            cursor: pointer;
            position: relative;
            margin: 20px 0;
            width: 340px;
            height: 340px;
            transition: transform 0.2s ease;
        }
        .moon-wrapper:hover {
            transform: scale(1.08);
        }
        .moon-wrapper:active {
            transform: scale(0.92);
        }

        .moon {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow:
                0 0 60px rgba(255, 215, 150, 0.4),
                0 0 120px rgba(255, 215, 150, 0.2),
                inset -35px -35px 90px rgba(0, 0, 0, 0.4),
                inset 35px 35px 90px rgba(255, 255, 255, 0.3);
            position: relative;
            animation: moonOrbit 30s linear infinite, pulseGlow 4s ease-in-out infinite alternate;
            transition: box-shadow 0.5s ease;
        }
        /* Красный режим для луны */
        .container.blood-mode .moon {
            box-shadow:
                0 0 60px rgba(255, 0, 0, 0.6),
                0 0 120px rgba(255, 0, 0, 0.3),
                inset -35px -35px 90px rgba(0, 0, 0, 0.4),
                inset 35px 35px 90px rgba(255, 0, 0, 0.2);
        }
        @keyframes moonOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 40px rgba(255,215,150,0.3), 0 0 80px rgba(255,215,150,0.1), inset -35px -35px 90px rgba(0,0,0,0.4), inset 35px 35px 90px rgba(255,255,255,0.3); }
            100% { box-shadow: 0 0 100px rgba(255,215,150,0.6), 0 0 200px rgba(255,215,150,0.3), inset -35px -35px 90px rgba(0,0,0,0.5), inset 35px 35px 90px rgba(255,255,255,0.4); }
        }
        /* Красная пульсация */
        .container.blood-mode .moon {
            animation: moonOrbit 30s linear infinite, pulseGlowRed 4s ease-in-out infinite alternate;
        }
        @keyframes pulseGlowRed {
            0% { box-shadow: 0 0 40px rgba(255,0,0,0.4), 0 0 80px rgba(255,0,0,0.2), inset -35px -35px 90px rgba(0,0,0,0.4), inset 35px 35px 90px rgba(255,0,0,0.2); }
            100% { box-shadow: 0 0 100px rgba(255,0,0,0.8), 0 0 200px rgba(255,0,0,0.4), inset -35px -35px 90px rgba(0,0,0,0.5), inset 35px 35px 90px rgba(255,0,0,0.3); }
        }

        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 150, 0.6), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .click-effect.active {
            animation: flash 0.4s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
        }
        /* Красный эффект клика */
        .container.blood-mode .click-effect {
            background: radial-gradient(circle, rgba(255, 0, 0, 0.8), transparent 70%);
        }

        /* ---------- СЧЁТЧИК ---------- */
        .counter {
            margin: 12px 0 5px;
            color: #f0e6d0;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 215, 150, 0.2);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 35px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 160px;
            transition: all 0.5s ease;
        }
        .container.blood-mode .counter {
            color: #ff6b6b;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        /* ---------- КНОПКА ВЫХОДА ---------- */
        .logout-btn {
            margin-top: 18px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.0rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .logout-btn:active {
            transform: scale(0.95);
        }

        /* ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1f35;
            border-radius: 30px;
            padding: 30px 40px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #f0e6d0;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.6rem;
        }
        .modal .section-title {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            text-align: left;
            margin-top: 15px;
            margin-bottom: 8px;
        }
        .modal .bg-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .modal .bg-options button {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #f0e6d0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal .bg-options button:hover {
            background: rgba(255,215,150,0.15);
            border-color: rgba(255,215,150,0.3);
        }
        .modal .bg-options button.active {
            background: rgba(255,215,150,0.25);
            border-color: rgba(255,215,150,0.5);
        }
        .modal .account-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        .modal .account-info p {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .modal .account-info strong {
            color: #f0e6d0;
        }
        .modal .btn-danger {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 15px 0 8px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 80, 80, 0.15);
            color: #ff6b6b;
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 80, 80, 0.2);
        }
        .modal .btn-danger:hover {
            background: rgba(255, 80, 80, 0.25);
            transform: scale(1.02);
        }
        .modal .close-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
            font-size: 1.0rem;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .modal .close-btn:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        /* ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- */
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .confirm-overlay.active {
            display: flex;
        }
        .confirm-box {
            background: #1a1f35;
            border-radius: 30px;
            padding: 30px 40px;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            text-align: center;
        }
        .confirm-box p {
            color: #f0e6d0;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .confirm-box .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .confirm-box .buttons button {
            padding: 10px 30px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            min-width: 100px;
        }
        .confirm-box .btn-yes {
            background: rgba(255, 80, 80, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 80, 80, 0.3);
        }
        .confirm-box .btn-yes:hover {
            background: rgba(255, 80, 80, 0.3);
            transform: scale(1.05);
        }
        .confirm-box .btn-no {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .confirm-box .btn-no:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 700px) {
            .container { padding: 30px; max-width: 100%; }
            .moon-wrapper { width: 260px; height: 260px; }
            .counter { font-size: 2.8rem; padding: 8px 20px; min-width: 120px; }
            .subtitle { font-size: 2rem; letter-spacing: 4px; }
            .settings-icon { font-size: 1.6rem; top: 15px; right: 18px; }
            .planet-1 { width: 40px; height: 40px; }
            .planet-2 { width: 30px; height: 30px; }
        }
        @media (max-width: 450px) {
            .moon-wrapper { width: 200px; height: 200px; }
            .counter { font-size: 2.2rem; padding: 6px 15px; min-width: 90px; }
            .subtitle { font-size: 1.6rem; }
            .container { padding: 20px; }
            .modal { padding: 20px 25px; }
        }
    </style>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <button class="settings-icon" id="settingsBtn" title="Настройки">⚙️</button>
        <div class="subtitle">Кликни по луне</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock" class="auth-form">
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <div id="loginFields">
                <div class="login-type">
                    <label><input type="radio" name="loginType" value="email" checked /> По email</label>
                    <label><input type="radio" name="loginType" value="nickname" /> По логину</label>
                </div>
                <div class="row">
                    <input type="text" id="loginInput" placeholder="Логин или email" />
                    <input type="password" id="passwordInput" placeholder="Пароль" />
                </div>
            </div>

            <div id="registerFields" class="hidden">
                <div class="row">
                    <input type="email" id="regEmailInput" placeholder="Email (обязательно)" />
                    <input type="text" id="regNicknameInput" placeholder="Логин (обязательно)" />
                    <input type="password" id="regPasswordInput" placeholder="Пароль (минимум 6 символов)" />
                </div>
            </div>

            <div class="buttons">
                <button id="actionBtn">Войти</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <!-- ИГРОВАЯ ЗОНА -->
        <div id="gameArea" class="game-area">
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon" id="moon"></div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div>
                <div class="counter" id="counter">0</div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚀 Выйти</button>
        </div>
    </div>

    <!-- ---------- МОДАЛЬНОЕ ОКНО НАСТРОЕК ---------- -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Настройки</h2>
            
            <div class="section-title">⏱️ Общее время</div>
            <div style="color: rgba(255, 215, 150, 0.7); font-size: 1rem; margin-bottom: 15px;" id="totalTimeDisplay">0 ч</div>

            <div class="section-title">🎨 Фон луны</div>
            <div class="bg-options" id="bgOptions">
                <button data-bg="normal">⚪ Обычная</button>
                <button data-bg="blood">🔴 Кровавая</button>
            </div>

            <div class="account-info">
                <p>👤 <strong id="accountNickname">Гость</strong></p>
                <p>📧 <strong id="accountEmail">-</strong></p>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div class="section-title">🗑️ Прогресс</div>
                <button class="btn-danger" id="resetProgressBtn">Сбросить прогресс</button>
            </div>

            <button class="close-btn" id="closeSettingsBtn">Закрыть</button>
        </div>
    </div>

    <!-- ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Вы уверены, что хотите сбросить весь прогресс? Это действие необратимо.</p>
            <div class="buttons">
                <button class="btn-yes" id="confirmYes">Да</button>
                <button class="btn-no" id="confirmNo">Нет</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  НАСТРОЙКА SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://zllnsmztaakdwjpnijsk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AHp63XmOZhgE2xYmhxFvsw_cB1urGrt';

        if (typeof window.supabase === 'undefined') {
            alert('⚠️ Не удалось загрузить библиотеку Supabase. Проверьте интернет.');
            throw new Error('Supabase library not loaded');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null;
        let playerData = null;
        let clickCount = 0;
        let totalSecondsPlayed = 0;
        let sessionStartTimestamp = null;
        let timeUpdateInterval = null;
        let autoSaveInterval = null;

        // DOM-элементы
        const authBlock = document.getElementById('authBlock');
        const gameArea = document.getElementById('gameArea');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginFields = document.getElementById('loginFields');
        const registerFields = document.getElementById('registerFields');
        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const regEmailInput = document.getElementById('regEmailInput');
        const regNicknameInput = document.getElementById('regNicknameInput');
        const regPasswordInput = document.getElementById('regPasswordInput');
        const actionBtn = document.getElementById('actionBtn');
        const authMessage = document.getElementById('authMessage');
        const counterEl = document.getElementById('counter');
        const totalTimeDisplay = document.getElementById('totalTimeDisplay');
        const accountNickname = document.getElementById('accountNickname');
        const accountEmail = document.getElementById('accountEmail');
        const moonWrapper = document.getElementById('moonWrapper');
        const moonElement = document.getElementById('moon');
        const clickEffect = document.getElementById('clickEffect');
        const logoutBtn = document.getElementById('logoutBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        const bgOptions = document.getElementById('bgOptions');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');

        let currentMode = 'login';

        // ============================================================
        //  ФОРМАТИРОВАНИЕ ВРЕМЕНИ
        // ============================================================
        function formatTime(seconds) {
            if (seconds < 60) return `${seconds} сек`;
            
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} мин`;
            
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} ч`;
            
            const days = Math.floor(hours / 24);
            return `${days} дн`;
        }

        // ============================================================
        //  УПРАВЛЕНИЕ ВКЛАДКАМИ
        // ============================================================
        function setMode(mode) {
            currentMode = mode;
            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                loginFields.classList.remove('hidden');
                registerFields.classList.add('hidden');
                actionBtn.textContent = 'Войти';
                regEmailInput.value = '';
                regNicknameInput.value = '';
                regPasswordInput.value = '';
                authMessage.textContent = '';
                authMessage.className = 'error';
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                registerFields.classList.remove('hidden');
                loginFields.classList.add('hidden');
                actionBtn.textContent = 'Зарегистрироваться';
                loginInput.value = '';
                passwordInput.value = '';
                authMessage.textContent = '';
                authMessage.className = 'error';
            }
        }

        tabLogin.addEventListener('click', () => setMode('login'));
        tabRegister.addEventListener('click', () => setMode('register'));

        // ============================================================
        //  ЗВЁЗДЫ
        // ============================================================
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 300; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) return 'tablet';
            if (/Mobile|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(ua)) return 'mobile';
            return 'desktop';
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', version = 'Unknown';
            if (ua.indexOf('Chrome') > -1) { browser = 'Chrome'; version = ua.match(/Chrome\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Firefox') > -1) { browser = 'Firefox'; version = ua.match(/Firefox\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Safari') > -1) { browser = 'Safari'; version = ua.match(/Version\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Edge') > -1) { browser = 'Edge'; version = ua.match(/Edge\/(\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) { browser = 'Opera'; version = ua.match(/(Opera|OPR)\/(\d+)/)?.[2] || ''; }
            return { browser, version };
        }

        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown', version = '';
            if (ua.indexOf('Windows') > -1) { os = 'Windows'; version = ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('Mac OS') > -1) { os = 'macOS'; version = ua.match(/Mac OS X (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Android') > -1) { os = 'Android'; version = ua.match(/Android (\d+\.\d+)/)?.[1] || ''; }
            else if (ua.indexOf('iOS') > -1 || ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) { os = 'iOS'; version = ua.match(/OS (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; }
            else if (ua.indexOf('Linux') > -1) { os = 'Linux'; }
            return { os, version };
        }

        function getScreenInfo() {
            return { width: window.screen.width, height: window.screen.height, colorDepth: window.screen.colorDepth };
        }

        function getLanguage() { return navigator.language || navigator.userLanguage || 'en'; }
        function getTimezone() { return Intl.DateTimeFormat().resolvedOptions().timeZone; }

        function collectStaticDeviceData() {
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screen = getScreenInfo();
            return {
                device_type: getDeviceType(),
                browser: browser.browser,
                browser_version: browser.version,
                os: os.os,
                os_version: os.version,
                screen_width: screen.width,
                screen_height: screen.height,
                color_depth: screen.colorDepth,
                language: getLanguage(),
                timezone: getTimezone(),
                user_agent: navigator.userAgent,
                referrer: document.referrer || ''
            };
        }

        // ============================================================
        //  РАБОТА С БАЗОЙ ДАННЫХ
        // ============================================================
        async function createOrUpdatePlayer(userId, email) {
            const staticData = collectStaticDeviceData();
            const { data: existing, error: selectError } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if (selectError && selectError.code !== 'PGRST116') {
                console.error('Ошибка проверки игрока:', selectError);
                return null;
            }

            const username = currentUser?.user_metadata?.username || null;

            if (existing) {
                const { data, error } = await supabaseClient
                    .from('players')
                    .update({
                        email: email || existing.email,
                        username: username || existing.username,
                        session_count: (existing.session_count || 0) + 1,
                        current_session_start: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId)
                    .select()
                    .single();
                if (error) console.error('Ошибка обновления игрока:', error);
                return data || existing;
            } else {
                const newPlayer = {
                    id: userId,
                    email: email,
                    username: username,
                    total_clicks: 0,
                    first_click_at: new Date().toISOString(),
                    last_click_at: null,
                    session_count: 1,
                    total_seconds_played: 0,
                    current_session_start: new Date().toISOString(),
                    ...staticData,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                const { data, error } = await supabaseClient
                    .from('players')
                    .insert(newPlayer)
                    .select()
                    .single();
                if (error) {
                    console.error('Ошибка создания игрока:', error);
                    return null;
                }
                return data;
            }
        }

        async function loadPlayerData(userId) {
            const { data, error } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .single();
            if (error) {
                console.error('Ошибка загрузки данных:', error);
                return null;
            }
            return data;
        }

        async function updateClicksAndTime(playerId, newTotal, clickTimestamp, x, y) {
            const updateData = {
                total_clicks: newTotal,
                last_click_at: clickTimestamp,
                total_seconds_played: totalSecondsPlayed,
                updated_at: new Date().toISOString()
            };
            const { error: updateError } = await supabaseClient
                .from('players')
                .update(updateData)
                .eq('id', playerId);
            if (updateError) console.error('Ошибка обновления players:', updateError);

            const { error: insertError } = await supabaseClient
                .from('clicks')
                .insert({
                    player_id: playerId,
                    click_time: clickTimestamp,
                    x: x,
                    y: y
                });
            if (insertError) console.error('Ошибка вставки клика:', insertError);
        }

        async function saveTimeOnly() {
            if (!currentUser || !playerData) return;
            const { error } = await supabaseClient
                .from('players')
                .update({
                    total_seconds_played: totalSecondsPlayed,
                    updated_at: new Date().toISOString()
                })
                .eq('id', currentUser.id);
            if (error) console.error('Ошибка сохранения времени:', error);
        }

        async function resetProgress() {
            if (!currentUser || !playerData) {
                alert('⚠️ Ошибка: данные игрока не загружены');
                return;
            }

            const { error } = await supabaseClient
                .from('players')
                .update({
                    total_clicks: 0,
                    total_seconds_played: 0,
                    updated_at: new Date().toISOString()
                })
                .eq('id', currentUser.id);

            if (error) {
                console.error('Ошибка сброса прогресса:', error);
                alert('⚠️ Ошибка при сбросе прогресса');
                return;
            }

            // Обнулить локальные переменные
            clickCount = 0;
            totalSecondsPlayed = 0;
            counterEl.textContent = '0';
            totalTimeDisplay.textContent = '0 ч';
            playerData.total_clicks = 0;
            playerData.total_seconds_played = 0;

            // Очистить таблицу кликов
            const { error: deleteError } = await supabaseClient
                .from('clicks')
                .delete()
                .eq('player_id', currentUser.id);
            if (deleteError) console.error('Ошибка удаления кликов:', deleteError);

            alert('✅ Прогресс успешно сброшен!');
            settingsModal.classList.remove('active');
        }

        // ============================================================
        //  РЕГИСТРАЦИЯ И АВТОРИЗАЦИЯ
        // ============================================================
        async function handleRegister() {
            const email = regEmailInput.value.trim();
            const nickname = regNicknameInput.value.trim();
            const password = regPasswordInput.value.trim();

            if (!email || !nickname || !password) {
                authMessage.textContent = '❌ Заполните все поля';
                authMessage.className = 'error';
                return;
            }

            if (password.length < 6) {
                authMessage.textContent = '❌ Пароль должен быть минимум 6 символов';
                authMessage.className = 'error';
                return;
            }

            authMessage.textContent = '⏳ Регистрация...';
            authMessage.className = 'error';

            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        username: nickname
                    }
                }
            });

            if (error) {
                authMessage.textContent = `❌ ${error.message}`;
                authMessage.className = 'error';
                console.error('Ошибка регистрации:', error);
                return;
            }

            if (data?.user) {
                currentUser = data.user;
                playerData = await createOrUpdatePlayer(currentUser.id, currentUser.email);
                authMessage.textContent = '✅ Регистрация успешна!';
                authMessage.className = 'error';
                setTimeout(initGame, 1500);
            }
        }

        async function handleLogin() {
            const loginTypeSelected = document.querySelector('input[name="loginType"]:checked').value;
            let email = '';

            if (loginTypeSelected === 'email') {
                email = loginInput.value.trim();
                if (!email) {
                    authMessage.textContent = '❌ Введите email';
                    authMessage.className = 'error';
                    return;
                }
            } else {
                const nickname = loginInput.value.trim();
                if (!nickname) {
                    authMessage.textContent = '❌ Введите логин';
                    authMessage.className = 'error';
                    return;
                }
                const { data, error } = await supabaseClient
                    .from('players')
                    .select('email')
                    .eq('username', nickname)
                    .single();
                if (error || !data) {
                    authMessage.textContent = '❌ Логин не найден';
                    authMessage.className = 'error';
                    return;
                }
                email = data.email;
            }

            const password = passwordInput.value.trim();
            if (!password) {
                authMessage.textContent = '❌ Введите пароль';
                authMessage.className = 'error';
                return;
            }

            authMessage.textContent = '⏳ Вход...';
            authMessage.className = 'error';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                authMessage.textContent = `❌ ${error.message}`;
                authMessage.className = 'error';
                console.error('Ошибка входа:', error);
                return;
            }

            if (data?.user) {
                currentUser = data.user;
                playerData = await loadPlayerData(currentUser.id);
                if (playerData) {
                    clickCount = playerData.total_clicks || 0;
                    totalSecondsPlayed = playerData.total_seconds_played || 0;
                    authMessage.textContent = '✅ Вход успешен!';
                    authMessage.className = 'error';
                    setTimeout(initGame, 1500);
                } else {
                    playerData = await createOrUpdatePlayer(currentUser.id, currentUser.email);
                    clickCount = 0;
                    totalSecondsPlayed = 0;
                    authMessage.textContent = '✅ Вход успешен!';
                    authMessage.className = 'error';
                    setTimeout(initGame, 1500);
                }
            }
        }

        actionBtn.addEventListener('click', () => {
            if (currentMode === 'login') {
                handleLogin();
            } else {
                handleRegister();
            }
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ ИГРЫ
        // ============================================================
        function initGame() {
            authBlock.classList.add('hidden');
            gameArea.classList.add('active');
            counterEl.textContent = clickCount;
            updateTimeDisplay();

            sessionStartTimestamp = Date.now();
            if (timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(() => {
                totalSecondsPlayed++;
                updateTimeDisplay();
            }, 1000);

            if (autoSaveInterval) clearInterval(autoSaveInterval);
            autoSaveInterval = setInterval(saveTimeOnly, 30000);

            accountNickname.textContent = currentUser?.user_metadata?.username || currentUser?.email || 'Гость';
            accountEmail.textContent = currentUser?.email || '-';

            const savedMode = localStorage.getItem('moonMode') || 'normal';
            setMoonMode(savedMode);
        }

        function updateTimeDisplay() {
            totalTimeDisplay.textContent = formatTime(totalSecondsPlayed);
        }

        // ============================================================
        //  ЛУНА КЛИКЕР
        // ============================================================
        moonWrapper.addEventListener('click', async (e) => {
            clickCount++;
            counterEl.textContent = clickCount;

            const clickEffect = document.getElementById('clickEffect');
            clickEffect.classList.remove('active');
            void clickEffect.offsetWidth;
            clickEffect.classList.add('active');

            const rect = moonWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const now = new Date().toISOString();
            await updateClicksAndTime(currentUser.id, clickCount, now, x, y);
        });

        // ============================================================
        //  КНОПКИ И МОДАЛЬНЫЕ ОКНА
        // ============================================================
        logoutBtn.addEventListener('click', async () => {
            if (timeUpdateInterval) clearInterval(timeUpdateInterval);
            if (autoSaveInterval) clearInterval(autoSaveInterval);

            await supabaseClient.auth.signOut();
            currentUser = null;
            playerData = null;
            clickCount = 0;
            totalSecondsPlayed = 0;
            authBlock.classList.remove('hidden');
            gameArea.classList.remove('active');
            setMode('login');
        });

        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
            updateTimeDisplay();
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        resetProgressBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('active');
        });

        confirmYes.addEventListener('click', async () => {
            confirmOverlay.classList.remove('active');
            await resetProgress();
        });

        confirmNo.addEventListener('click', () => {
            confirmOverlay.classList.remove('active');
        });

        // ============================================================
        //  ФОНЫ ЛУНЫ
        // ============================================================
        function setMoonMode(mode) {
            const container = document.getElementById('app');
            if (mode === 'blood') {
                container.classList.add('blood-mode');
                moonElement.style.backgroundImage = 'radial-gradient(circle at 30% 30%, #ff4444, #cc0000)';
            } else {
                container.classList.remove('blood-mode');
                moonElement.style.backgroundImage = 'radial-gradient(circle at 30% 30%, #f0e6d0, #d4af37)';
            }
            localStorage.setItem('moonMode', mode);

            document.querySelectorAll('.bg-options button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-bg') === mode) {
                    btn.classList.add('active');
                }
            });
        }

        bgOptions.addEventListener('click', (e) => {
            if (e.target.hasAttribute('data-bg')) {
                setMoonMode(e.target.getAttribute('data-bg'));
            }
        });

        // ============================================================
        //  ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ
        // ============================================================
        async function checkAuth() {
            const { data, error } = await supabaseClient.auth.getSession();
            if (data?.session) {
                currentUser = data.session.user;
                playerData = await loadPlayerData(currentUser.id);
                if (playerData) {
                    clickCount = playerData.total_clicks || 0;
                    totalSecondsPlayed = playerData.total_seconds_played || 0;
                }
                initGame();
            }
        }

        checkAuth();
    </script>
</body>
</html>
