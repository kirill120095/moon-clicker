<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="description" content="Лунный кликер - космическая idle игра">
  <title>🌙 Лунный Кликер</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/galaxy.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- ============================================================ -->
  <!-- ЗВЁЗДНОЕ НЕБО (ФОН) -->
  <!-- ============================================================ -->
  <div id="stars"></div>
  
  <!-- ============================================================ -->
  <!-- TOAST УВЕДОМЛЕНИЯ -->
  <!-- ============================================================ -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ============================================================ -->
  <!-- ЭКРАН АВТОРИЗАЦИИ -->
  <!-- ============================================================ -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">🌙</div>
      <h1 class="auth-title">Лунный Кликер</h1>
      <p class="auth-subtitle">Покоряй галактику кликами</p>
      
      <div class="auth-form">
        <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="authUsername" placeholder="Имя игрока" autocomplete="username" style="display:none;">
        
        <button id="loginBtn" class="btn-auth btn-login">Войти</button>
        <button id="registerBtn" class="btn-auth btn-register">Регистрация</button>
      </div>
      
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- ОСНОВНОЙ ЭКРАН ИГРЫ -->
  <!-- ============================================================ -->
  <div id="app" class="app hidden">
    
    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div id="counter" class="counter">💎 0</div>
      </div>
      <div class="top-bar-center">
        <div id="levelTitle" class="level-title">Уровень 1</div>
      </div>
      <div class="top-bar-right">
        <button id="lockToggleMain" class="btn-icon lock-btn" title="Зафиксировать уровень">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
        <button id="rollbackBtnMain" class="btn-icon rollback-btn" title="Откат уровня">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ТАЙМЕР БОССА -->
    <div id="timerBarContainer" class="timer-bar-container">
      <div id="timerBar" class="timer-bar"></div>
      <span id="timerPercent" class="timer-percent">30с</span>
    </div>

    <!-- HP БАР -->
    <div class="hp-bar-container">
      <div id="hpBar" class="hp-bar"></div>
      <span id="hpPercent" class="hp-percent">100/100</span>
    </div>

    <!-- ЛУНА (КЛИКАБЕЛЬНЫЙ ОБЪЕКТ) -->
    <div id="moonContainer" class="moon-container">
      <div id="moonWrapper" class="moon-wrapper">
        <div id="moonInner" class="moon-inner"></div>
        <div id="clickEffect" class="click-effect"></div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- ПАНЕЛИ (ВЫЕЗЖАЮЩИЕ МЕНЮ) -->
    <!-- ============================================================ -->

    <!-- ПАНЕЛЬ: МАГАЗИН -->
    <div id="shopPanel" class="panel panel-right hidden">
      <div class="panel-header">
        <h2 class="panel-title">🛒 Магазин</h2>
        <button class="btn-close-panel" onclick="window.closePanel('shopPanel')">✕</button>
      </div>
      <div class="panel-content">
        <div id="shopLockMessage" class="shop-lock-message">🔒 Доступно с 5 уровня</div>
        
        <!-- Улучшение урона -->
        <div class="shop-section">
          <h3 class="shop-section-title">⚔️ Урон клика</h3>
          <div class="shop-item">
            <div class="shop-item-info">
              <div id="clickDamageLevel" class="shop-item-level">Ур. 0: 1 → 2</div>
              <div id="clickDamagePrice" class="shop-item-price">30 💎</div>
            </div>
            <button id="buyClickDamageBtn" class="btn-buy-shop" onclick="window.gameEngine.buyClickDamage()">Купить</button>
          </div>
        </div>
        
        <!-- Слоты -->
        <div class="shop-section">
          <h3 class="shop-section-title">🎰 Слоты лун</h3>
          <div class="shop-item">
            <div class="shop-item-info">
              <div id="slotLevel" class="shop-item-level">Слотов: 1/3</div>
              <div id="slotPrice" class="shop-item-price">1500 💎</div>
            </div>
            <button id="buySlotBtn" class="btn-buy-shop" onclick="window.gameEngine.buySlot()">Купить</button>
          </div>
        </div>
        
        <!-- Луны -->
        <div class="shop-section">
          <h3 class="shop-section-title">🌙 Луны</h3>
          <div id="moonShopItems" class="moon-shop-items"></div>
        </div>
        
        <!-- Активные синергии -->
        <div class="shop-section">
          <h3 class="shop-section-title">🔗 Синергии</h3>
          <div id="activeSynergies" class="active-synergies"></div>
        </div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: ПРОФИЛЬ -->
    <div id="profilePanel" class="panel panel-left hidden">
      <div class="panel-header">
        <h2 class="panel-title">👤 Профиль</h2>
        <button class="btn-close-panel" onclick="window.closePanel('profilePanel')">✕</button>
      </div>
      <div class="panel-content panel-scrollable">
        <div id="profileContent" class="profile-content"></div>
        
        <div class="profile-actions">
          <button id="logoutBtn" class="btn-action btn-logout">Выйти</button>
          <button id="resetBtn" class="btn-action btn-reset">Сбросить прогресс</button>
        </div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: КВЕСТЫ -->
    <div id="questsPanel" class="panel panel-bottom hidden">
      <div class="panel-header">
        <h2 class="panel-title">🎯 Квесты</h2>
        <button class="btn-close-panel" onclick="window.closePanel('questsPanel')">✕</button>
      </div>
      <div class="panel-content panel-scrollable">
        <div id="questsList" class="quests-list"></div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: ДОСТИЖЕНИЯ -->
    <div id="achievementsPanel" class="panel panel-bottom hidden">
      <div class="panel-header">
        <h2 class="panel-title">🏆 Достижения</h2>
        <button class="btn-close-panel" onclick="window.closePanel('achievementsPanel')">✕</button>
      </div>
      <div class="panel-content panel-scrollable">
        <div id="achievementsList" class="achievements-list"></div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: ЛИДЕРЫ -->
    <div id="leadersPanel" class="panel panel-bottom hidden">
      <div class="panel-header">
        <h2 class="panel-title">🏅 Таблица лидеров</h2>
        <button class="btn-close-panel" onclick="window.closePanel('leadersPanel')">✕</button>
      </div>
      <div class="panel-content panel-scrollable">
        <div id="leadersList" class="leaders-list"></div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: НАСТРОЙКИ -->
    <div id="settingsPanel" class="panel panel-bottom hidden">
      <div class="panel-header">
        <h2 class="panel-title">⚙️ Настройки</h2>
        <button class="btn-close-panel" onclick="window.closePanel('settingsPanel')">✕</button>
      </div>
      <div class="panel-content">
        <div class="settings-item">
          <label class="settings-label">Тестовый режим</label>
          <button id="testModeToggle" class="btn-toggle" onclick="window.gameEngine.toggleTestMode()">ВЫКЛ</button>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <!-- ============================================================ -->
    <nav class="bottom-nav">
      <button class="nav-btn" onclick="window.openPanel('leadersPanel')" title="Лидеры">
        <span class="nav-icon">🏅</span>
        <span class="nav-label">Топ</span>
      </button>
      <button class="nav-btn" onclick="window.openPanel('profilePanel')" title="Профиль">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Профиль</span>
      </button>
      <button class="nav-btn" onclick="window.openPanel('shopPanel')" title="Магазин">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Магазин</span>
      </button>
      <button class="nav-btn" onclick="window.openPanel('questsPanel')" title="Квесты">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">Квесты</span>
      </button>
      <button class="nav-btn" onclick="window.openPanel('achievementsPanel')" title="Достижения">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Ачивки</span>
      </button>
    </nav>
  </div>

  <!-- ============================================================ -->
  <!-- МОДАЛЬНОЕ ОКНО ПОДТВЕРЖДЕНИЯ -->
  <!-- ============================================================ -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-backdrop" onclick="window.closeModal('confirmModal')"></div>
    <div class="modal-content">
      <h3 id="confirmTitle" class="modal-title">Подтверждение</h3>
      <p id="confirmMessage" class="modal-message">Вы уверены?</p>
      <div class="modal-actions">
        <button id="confirmYes" class="btn-modal btn-confirm">Да</button>
        <button id="confirmNo" class="btn-modal btn-cancel" onclick="window.closeModal('confirmModal')">Нет</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- JAVASCRIPT -->
  <!-- ============================================================ -->
  <script type="module" src="src/index.js"></script>
</body>
</html>
