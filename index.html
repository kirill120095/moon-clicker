<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Лунный кликер - космическая idle игра">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>🌙 Лунный Кликер</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/galaxy.css?v=5">
  <link rel="stylesheet" href="css/panel.css?v=5">
  <link rel="stylesheet" href="css/modal.css?v=5">
  <link rel="stylesheet" href="css/game.css?v=5">
  <link rel="stylesheet" href="css/responsive.css?v=5">
</head>
<body>
  <div id="stars"></div>
  <div id="toastContainer" class="toast-container"></div>

  <!-- ЭКРАН АВТОРИЗАЦИИ -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">🌙</div>
      <h1 class="auth-title">Лунный Кликер</h1>
      <p class="auth-subtitle">Покоряй галактику кликами</p>
      
      <div class="auth-form">
        <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="authUsername" placeholder="Имя игрока" autocomplete="username" style="display:none;">
        
        <button id="loginBtn" class="btn-auth btn-login">Войти</button>
        <button id="registerBtn" class="btn-auth btn-register">Регистрация</button>
      </div>
      
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН -->
  <div id="app" class="app hidden">
    
    <!-- ЛУНА ПО ЦЕНТРУ -->
    <div id="moonContainer" class="moon-container">
      <div id="moonWrapper" class="moon-wrapper">
        <div id="moonInner" class="moon-inner"></div>
        <div id="clickEffect" class="click-effect"></div>
      </div>
    </div>

    <!-- ИНФО ПОД ЛУНОЙ -->
    <div class="moon-info-below">
      <div class="info-row-top">
        <div id="counter" class="counter">💎 0</div>
        <div id="levelTitle" class="level-title">Уровень 1</div>
      </div>
      
      <div id="timerBarContainer" class="timer-bar-container">
        <div id="timerBar" class="timer-bar"></div>
        <span id="timerPercent" class="timer-percent">30с</span>
      </div>
      
      <div class="hp-bar-container">
        <div id="hpBar" class="hp-bar"></div>
        <span id="hpPercent" class="hp-percent">100/100</span>
      </div>
    </div>

    <!-- БОКОВАЯ КНОПКА: ПРОФИЛЬ (СЛЕВА) -->
    <button id="profileToggleBtn" class="side-toggle-btn side-toggle-left" onclick="window.togglePanel('profilePanel')">
      <span class="toggle-icon">👤</span>
      <span class="toggle-label">Профиль</span>
    </button>

    <!-- БОКОВАЯ КНОПКА: МАГАЗИН (СПРАВА) -->
    <button id="shopToggleBtn" class="side-toggle-btn side-toggle-right" onclick="window.togglePanel('shopPanel')">
      <span class="toggle-icon">🛒</span>
      <span class="toggle-label">Магазин</span>
    </button>

    <!-- ПАНЕЛЬ: ПРОФИЛЬ (СЛЕВА) - с вкладками Профиль/Топ/Настройки -->
    <div id="profilePanel" class="panel panel-left hidden">
      <div class="panel-header">
        <div class="panel-tabs">
          <button class="panel-tab active" data-tab="profile" onclick="window.switchProfileTab('profile')">👤 Профиль</button>
          <button class="panel-tab" data-tab="leaders" onclick="window.switchProfileTab('leaders')">🏅 Топ</button>
          <button class="panel-tab" data-tab="settings" onclick="window.switchProfileTab('settings')">⚙️ Настройки</button>
        </div>
      </div>
      <div class="panel-content panel-scrollable">
        <!-- Вкладка: Профиль -->
        <div id="profileTabContent" class="tab-content active">
          <div id="profileContent" class="profile-content"></div>
          <div class="profile-actions">
            <button id="logoutBtn" class="btn-action btn-logout">🚪 Выйти</button>
            <button id="resetBtn" class="btn-action btn-reset">♻️ Сбросить прогресс</button>
          </div>
        </div>
        
        <!-- Вкладка: Топ -->
        <div id="leadersTabContent" class="tab-content">
          <div id="leadersList" class="leaders-list"></div>
        </div>
        
        <!-- Вкладка: Настройки -->
        <div id="settingsTabContent" class="tab-content">
          <div class="settings-item">
            <label class="settings-label">Тестовый режим</label>
            <button id="testModeToggle" class="btn-toggle" onclick="window.gameEngine.toggleTestMode()">ВЫКЛ</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ПАНЕЛЬ: МАГАЗИН (СПРАВА) - с вкладками Магазин/Квесты/Ачивки -->
    <div id="shopPanel" class="panel panel-right hidden">
      <div class="panel-header">
        <div class="panel-tabs">
          <button class="panel-tab active" data-tab="shop" onclick="window.switchShopTab('shop')">🛒 Магазин</button>
          <button class="panel-tab" data-tab="quests" onclick="window.switchShopTab('quests')">🎯 Квесты</button>
          <button class="panel-tab" data-tab="achievements" onclick="window.switchShopTab('achievements')">🏆 Ачивки</button>
        </div>
      </div>
      <div class="panel-content panel-scrollable">
        <!-- Вкладка: Магазин -->
        <div id="shopTabContent" class="tab-content active">
          <div id="shopLockMessage" class="shop-lock-message">🔒 Доступно с 5 уровня</div>
          
          <div class="shop-section">
            <h3 class="shop-section-title">⚔️ Урон клика</h3>
            <div class="shop-item">
              <div class="shop-item-info">
                <div id="clickDamageLevel" class="shop-item-level">Ур. 0: 1 → 2</div>
                <div id="clickDamagePrice" class="shop-item-price">30 💎</div>
              </div>
              <button id="buyClickDamageBtn" class="btn-buy-shop" onclick="window.gameEngine.buyClickDamage()">Купить</button>
            </div>
          </div>
          
          <div class="shop-section">
            <h3 class="shop-section-title">🎰 Слоты лун</h3>
            <div class="shop-item">
              <div class="shop-item-info">
                <div id="slotLevel" class="shop-item-level">Слотов: 1/3</div>
                <div id="slotPrice" class="shop-item-price">1500 💎</div>
              </div>
              <button id="buySlotBtn" class="btn-buy-shop" onclick="window.gameEngine.buySlot()">Купить</button>
            </div>
          </div>
          
          <div class="shop-section">
            <h3 class="shop-section-title">🌙 Луны</h3>
            <div id="moonShopItems" class="moon-shop-items"></div>
          </div>
          
          <div class="shop-section">
            <h3 class="shop-section-title">🔗 Синергии</h3>
            <div id="activeSynergies" class="active-synergies"></div>
          </div>
        </div>
        
        <!-- Вкладка: Квесты -->
        <div id="questsTabContent" class="tab-content">
          <div id="questsList" class="quests-list"></div>
        </div>
        
        <!-- Вкладка: Ачивки -->
        <div id="achievementsTabContent" class="tab-content">
          <div id="achievementsList" class="achievements-list"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-backdrop" onclick="window.closeModal('confirmModal')"></div>
    <div class="modal-content">
      <h3 id="confirmTitle" class="modal-title">Подтверждение</h3>
      <p id="confirmMessage" class="modal-message">Вы уверены?</p>
      <div class="modal-actions">
        <button id="confirmYes" class="btn-modal btn-confirm">Да</button>
        <button id="confirmNo" class="btn-modal btn-cancel" onclick="window.closeModal('confirmModal')">Нет</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.min.js"></script>
  <script type="module" src="src/index.js?v=5"></script>
</body>
</html>
