<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ---------- ГАЛАКТИКА ---------- -->
    <div class="galaxy">
        <div class="stars" id="stars"></div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
    </div>

    <!-- ---------- ИГРОВОЙ КОНТЕЙНЕР ---------- -->
    <div class="container" id="app">
        <div class="subtitle">Кликни по луне</div>

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock" class="auth-form">
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <div id="loginFields">
                <div class="login-type">
                    <label><input type="radio" name="loginType" value="email" checked /> По email</label>
                    <label><input type="radio" name="loginType" value="nickname" /> По логину</label>
                </div>
                <div class="row">
                    <input type="text" id="loginInput" placeholder="Логин или email" />
                    <input type="password" id="passwordInput" placeholder="Пароль" />
                </div>
            </div>

            <div id="registerFields" class="hidden">
                <div class="row">
                    <input type="email" id="regEmailInput" placeholder="Email (обязательно)" />
                    <input type="text" id="regNicknameInput" placeholder="Логин (обязательно)" />
                    <input type="password" id="regPasswordInput" placeholder="Пароль (минимум 6 символов)" />
                </div>
            </div>

            <div class="buttons">
                <button id="actionBtn">Войти</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <!-- ИГРОВАЯ ЗОНА -->
        <div id="gameArea" class="game-area">
            <div class="level-title" id="levelTitle">Уровень 1</div>

            <!-- Луна -->
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon">
                    <div class="moon-inner" id="moonInner"></div>
                </div>
                <div class="click-effect" id="clickEffect"></div>
            </div>

            <!-- HP и таймер -->
            <div class="bars">
                <div class="bar-container">
                    <span class="bar-label">❤️</span>
                    <div class="bar-track">
                        <div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div>
                    </div>
                    <span class="bar-percent" id="hpPercent">100/100</span>
                </div>
                <div class="bar-container timer-bar-container" id="timerBarContainer">
                    <span class="bar-label">⏱️</span>
                    <div class="bar-track">
                        <div class="bar-fill timer-fill" id="timerBar" style="width:100%"></div>
                    </div>
                    <span class="bar-percent" id="timerPercent">30с</span>
                </div>
            </div>

            <!-- Счётчик -->
            <div class="counter" id="counter">0</div>

            <!-- Управление -->
            <div class="game-controls">
                <button class="btn-rollback" id="rollbackBtnMain" title="Откатить уровень">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12h14a4 4 0 0 1 0 8H9" />
                        <path d="M7 8l-4 4 4 4" />
                    </svg>
                </button>
                <button class="lock-toggle" id="lockToggleMain" title="Зафиксировать уровень">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </button>
            </div>

            <button class="logout-btn" id="logoutBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Выйти
            </button>
        </div>
    </div>

    <!-- ---------- БОКОВАЯ ПАНЕЛЬ ---------- -->
    <div class="side-panel" id="sidePanel">
        <button class="panel-close" id="panelClose">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <div class="panel-tabs">
            <button class="active" data-tab="leaders">🏆</button>
            <button data-tab="profile">👤</button>
            <button data-tab="settings">⚙️</button>
        </div>
        <div class="panel-content active" id="panelLeaders">
            <div style="color: rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:10px;">Топ игроков</div>
            <div id="leadersList">
                <div class="no-data">Загрузка...</div>
            </div>
        </div>
        <div class="panel-content" id="panelProfile">
            <div style="color: rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:10px;">Мой профиль</div>
            <div id="profileContent">
                <div class="no-data">Войдите, чтобы увидеть статистику</div>
            </div>
        </div>
        <div class="panel-content" id="panelSettings">
            <div style="color: rgba(255,255,255,0.5); font-size:0.8rem; margin-bottom:10px;">Настройки</div>
            <div class="settings-row">
                <span>🧪</span>
                <span>Тестовый режим</span>
                <input type="checkbox" id="testModeCheckbox" />
            </div>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <button class="btn-danger" id="resetProgressBtn">Сбросить прогресс</button>
            </div>
        </div>

        <!-- Кнопка обновления внизу -->
        <div class="panel-footer">
            <button id="refreshDataBtn" class="panel-refresh-btn" title="Обновить данные">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10" />
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                </svg>
                Обновить
            </button>
        </div>
    </div>

    <!-- ---------- ТРИГГЕР БОКОВОЙ ПАНЕЛИ (СТРЕЛКА) ---------- -->
    <button class="panel-trigger" id="panelTrigger" title="Открыть панель">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
        </svg>
    </button>

    <!-- ---------- КАСТОМНОЕ ПОДТВЕРЖДЕНИЕ ---------- -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p id="confirmMessage">Вы уверены, что хотите сбросить весь прогресс? Это действие необратимо.</p>
            <div class="buttons">
                <button class="btn-yes" id="confirmYes">Да</button>
                <button class="btn-no" id="confirmNo">Нет</button>
            </div>
        </div>
    </div>

    <!-- ---------- TOAST-КОНТЕЙНЕР ---------- -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
