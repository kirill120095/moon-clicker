<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер с аккаунтами</title>
    <!-- Подключаем Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        /* ---------- Стили (те же, что были) ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0b0e1a 0%, #1a1f35 50%, #0b0e1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #f0e6d0;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 215, 150, 0.2);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
        }
        .auth-form input {
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #f0e6d0;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .auth-form input:focus {
            border-color: rgba(255, 215, 150, 0.5);
        }
        .auth-form .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .auth-form button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border: 1px solid rgba(255, 215, 150, 0.2);
        }
        .auth-form button:hover {
            background: rgba(255, 215, 150, 0.25);
            transform: scale(1.03);
        }
        .auth-form .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .auth-form .success {
            color: #69db7c;
            font-size: 0.85rem;
        }
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }
        .moon-wrapper {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
            margin: 10px 0;
        }
        .moon-wrapper:active {
            transform: scale(0.92);
        }
        .moon-wrapper:hover {
            transform: scale(1.05);
        }
        .moon {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f5f0e8, #c8bda8 60%, #8a7e6b);
            box-shadow: 0 0 40px rgba(255, 215, 150, 0.3), 0 0 80px rgba(255, 215, 150, 0.15), inset -20px -20px 60px rgba(0, 0, 0, 0.3), inset 20px 20px 60px rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .moon::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(160, 140, 120, 0.4), rgba(100, 85, 75, 0.6));
            top: 25%;
            left: 20%;
            box-shadow: 60px 50px 0 -5px rgba(120, 100, 85, 0.4), -30px 70px 0 -8px rgba(140, 120, 105, 0.3), 80px -30px 0 -10px rgba(130, 110, 95, 0.35);
        }
        .moon::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(180, 160, 140, 0.3), rgba(100, 85, 75, 0.5));
            top: 60%;
            left: 70%;
            box-shadow: -40px -20px 0 -5px rgba(140, 120, 105, 0.3);
        }
        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 150, 0.4), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .click-effect.active {
            animation: flash 0.3s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
        }
        .counter {
            margin: 15px 0 5px;
            color: #f0e6d0;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 215, 150, 0.2);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 30px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 120px;
        }
        .counter-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .player-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .logout-btn {
            margin-top: 15px;
            padding: 8px 25px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 600px) {
            .moon { width: 150px; height: 150px; }
            .counter { font-size: 2.2rem; padding: 6px 20px; min-width: 80px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🌙 Лунный кликер</h1>
        <p class="subtitle">Кликни по луне</p>

        <!-- ---------- БЛОК АВТОРИЗАЦИИ (с полем никнейма) ---------- -->
        <div id="authBlock" class="auth-form">
            <input type="email" id="emailInput" placeholder="Email" />
            <input type="password" id="passwordInput" placeholder="Пароль" />
            <input type="text" id="nicknameInput" placeholder="Никнейм (при регистрации)" />
            <div class="buttons">
                <button id="loginBtn">Войти</button>
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <!-- ---------- ИГРОВАЯ ЗОНА ---------- -->
        <div id="gameArea" class="game-area">
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon" id="moon"></div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div>
                <div class="counter" id="counter">0</div>
                <div class="counter-label">кликов</div>
            </div>
            <div class="player-info" id="playerInfo">Загружаем...</div>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  НАСТРОЙКА SUPABASE (используем уникальное имя переменной)
        // ============================================================
        const SUPABASE_URL = 'https://zllnsmztaakdwjpnijsk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AHp63XmOZhgE2xYmhxFvsw_cB1urGrt';

        if (typeof window.supabase === 'undefined') {
            document.getElementById('authMessage').textContent = '⚠️ Не удалось загрузить библиотеку Supabase. Проверьте интернет.';
            throw new Error('Supabase library not loaded');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null;
        let playerData = null;
        let clickCount = 0;
        let lastClickTime = null;
        let totalSecondsPlayed = 0;

        // DOM-элементы
        const authBlock = document.getElementById('authBlock');
        const gameArea = document.getElementById('gameArea');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const nicknameInput = document.getElementById('nicknameInput');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authMessage = document.getElementById('authMessage');
        const counterEl = document.getElementById('counter');
        const playerInfo = document.getElementById('playerInfo');
        const moonWrapper = document.getElementById('moonWrapper');
        const clickEffect = document.getElementById('clickEffect');
        const logoutBtn = document.getElementById('logoutBtn');

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (сбор статистики)
        // ============================================================
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) return 'tablet';
            if (/Mobile|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(ua)) return 'mobile';
            return 'desktop';
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown',
                version = 'Unknown';
            if (ua.indexOf('Chrome') > -1) { browser = 'Chrome';
                version = ua.match(/Chrome\/(\d+)/)?.[1] || ''; } else if (ua.indexOf('Firefox') > -1) { browser = 'Firefox';
                version = ua.match(/Firefox\/(\d+)/)?.[1] || ''; } else if (ua.indexOf('Safari') > -1) { browser = 'Safari';
                version = ua.match(/Version\/(\d+)/)?.[1] || ''; } else if (ua.indexOf('Edge') > -1) { browser = 'Edge';
                version = ua.match(/Edge\/(\d+)/)?.[1] || ''; } else if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) { browser =
                    'Opera';
                version = ua.match(/(Opera|OPR)\/(\d+)/)?.[2] || ''; }
            return { browser, version };
        }

        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown',
                version = '';
            if (ua.indexOf('Windows') > -1) { os = 'Windows';
                version = ua.match(/Windows NT (\d+\.\d+)/)?.[1] || ''; } else if (ua.indexOf('Mac OS') > -1) { os = 'macOS';
                version = ua.match(/Mac OS X (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; } else if (ua.indexOf('Android') > -1) { os =
                    'Android';
                version = ua.match(/Android (\d+\.\d+)/)?.[1] || ''; } else if (ua.indexOf('iOS') > -1 || ua.indexOf('iPhone') > -1 || ua
                    .indexOf('iPad') > -1) { os = 'iOS';
                version = ua.match(/OS (\d+[._\d]+)/)?.[1]?.replace(/_/g, '.') || ''; } else if (ua.indexOf('Linux') > -1) { os =
                    'Linux'; }
            return { os, version };
        }

        function getScreenInfo() {
            return { width: window.screen.width, height: window.screen.height, colorDepth: window.screen.colorDepth };
        }

        function getLanguage() { return navigator.language || navigator.userLanguage || 'en'; }

        function getTimezone() { return Intl.DateTimeFormat().resolvedOptions().timeZone; }

        // --- НОВАЯ функция геолокации (через ip-api.com) ---
        async function fetchGeoData() {
            try {
                const res = await fetch('https://ip-api.com/json/');
                if (!res.ok) throw new Error('Geo API error');
                const data = await res.json();
                return {
                    country: data.country || '',
                    city: data.city || '',
                    region: data.regionName || '',
                    postal: data.zip || '',
                    ip: data.query || ''
                };
            } catch (e) {
                console.warn('Не удалось получить геоданные', e);
                return { country: '', city: '', region: '', postal: '', ip: '' };
            }
        }

        function collectStaticDeviceData() {
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screen = getScreenInfo();
            return {
                device_type: getDeviceType(),
                browser: browser.browser,
                browser_version: browser.version,
                os: os.os,
                os_version: os.version,
                screen_width: screen.width,
                screen_height: screen.height,
                color_depth: screen.colorDepth,
                language: getLanguage(),
                timezone: getTimezone(),
                user_agent: navigator.userAgent,
                referrer: document.referrer || ''
            };
        }

        // ============================================================
        //  РАБОТА С БАЗОЙ ДАННЫХ
        // ============================================================
        async function createOrUpdatePlayer(userId, geoData) {
            const staticData = collectStaticDeviceData();

            // Проверяем, существует ли запись
            const { data: existing, error: selectError } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if (selectError && selectError.code !== 'PGRST116') {
                console.error('Ошибка проверки игрока:', selectError);
                return null;
            }

            // Берём никнейм из метаданных пользователя (если есть)
            const username = currentUser?.user_metadata?.username || null;

            if (existing) {
                // Обновляем существующего
                const { data, error } = await supabaseClient
                    .from('players')
                    .update({
                        username: username || existing.username,
                        ip: geoData.ip || existing.ip,
                        country: geoData.country || existing.country,
                        city: geoData.city || existing.city,
                        region: geoData.region || existing.region,
                        postal: geoData.postal || existing.postal,
                        session_count: (existing.session_count || 0) + 1,
                        current_session_start: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId)
                    .select()
                    .single();
                if (error) console.error('Ошибка обновления игрока:', error);
                return data || existing;
            } else {
                // Создаём нового
                const newPlayer = {
                    id: userId,
                    username: username,
                    total_clicks: 0,
                    first_click_at: new Date().toISOString(),
                    last_click_at: null,
                    session_count: 1,
                    total_seconds_played: 0,
                    current_session_start: new Date().toISOString(),
                    ...staticData,
                    ...geoData,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                const { data, error } = await supabaseClient
                    .from('players')
                    .insert(newPlayer)
                    .select()
                    .single();
                if (error) {
                    console.error('Ошибка создания игрока:', error);
                    return null;
                }
                return data;
            }
        }

        async function loadPlayerData(userId) {
            const { data, error } = await supabaseClient
                .from('players')
                .select('*')
                .eq('id', userId)
                .single();
            if (error) {
                console.error('Ошибка загрузки данных:', error);
                return null;
            }
            return data;
        }

        async function updateClicksAndTime(playerId, newTotal, secondsAdded, clickTimestamp, x, y) {
            const updateData = {
                total_clicks: newTotal,
                last_click_at: clickTimestamp,
                total_seconds_played: totalSecondsPlayed,
                updated_at: new Date().toISOString()
            };
            const { error: updateError } = await supabaseClient
                .from('players')
                .update(updateData)
                .eq('id', playerId);
            if (updateError) console.error('Ошибка обновления players:', updateError);

            const { error: insertError } = await supabaseClient
                .from('clicks')
                .insert({
                    player_id: playerId,
                    click_time: clickTimestamp,
                    x: x,
                    y: y
                });
            if (insertError) console.error('Ошибка вставки клика:', insertError);
        }

        // ============================================================
        //  ОСНОВНАЯ ЛОГИКА ИГРЫ
        // ============================================================
        function updateUI() {
            counterEl.textContent = clickCount;
            counterEl.style.transform = 'scale(1.1)';
            setTimeout(() => { counterEl.style.transform = 'scale(1)'; }, 100);

            if (playerData && currentUser) {
                // Показываем никнейм из таблицы, если есть, иначе email
                const displayName = playerData.username || currentUser.email || 'anon';
                const info = `👤 ${displayName} | Сессий: ${playerData.session_count || 0} | Всего времени: ${Math.floor((playerData.total_seconds_played || 0) / 60)} мин`;
                playerInfo.textContent = info;
            }
        }

        async function handleClick(e) {
            if (!currentUser) return;
            const rect = moonWrapper.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            const now = new Date();
            const nowISO = now.toISOString();
            let secondsAdded = 0;
            if (lastClickTime) {
                secondsAdded = (now - lastClickTime) / 1000;
                totalSecondsPlayed += secondsAdded;
            }
            lastClickTime = now;
            clickCount++;
            updateUI();

            clickEffect.classList.remove('active');
            void clickEffect.offsetWidth;
            clickEffect.classList.add('active');
            moonWrapper.style.transform = 'scale(0.92)';
            setTimeout(() => { moonWrapper.style.transform = 'scale(1)'; }, 100);

            await updateClicksAndTime(currentUser.id, clickCount, secondsAdded, nowISO, x, y);
        }

        // ============================================================
        //  АВТОРИЗАЦИЯ (с никнеймом)
        // ============================================================
        async function signIn(email, password) {
            authMessage.textContent = '';
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                authMessage.textContent = '❌ ' + error.message;
                return false;
            }
            return true;
        }

        async function signUp(email, password, nickname) {
            authMessage.textContent = '';
            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: { username: nickname }
                }
            });
            if (error) {
                authMessage.textContent = '❌ ' + error.message;
                return false;
            }
            authMessage.textContent = '✅ Регистрация успешна! Теперь войдите.';
            authMessage.className = 'success';
            return true;
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            playerData = null;
            clickCount = 0;
            lastClickTime = null;
            totalSecondsPlayed = 0;
            authBlock.style.display = 'block';
            gameArea.classList.remove('active');
            counterEl.textContent = '0';
            playerInfo.textContent = '';
            authMessage.textContent = '';
            authMessage.className = 'error';
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ ПОСЛЕ ВХОДА
        // ============================================================
        async function onUserLoggedIn(user) {
            currentUser = user;
            authBlock.style.display = 'none';
            gameArea.classList.add('active');

            const geoData = await fetchGeoData();
            const updatedPlayer = await createOrUpdatePlayer(user.id, geoData);
            if (updatedPlayer) {
                playerData = updatedPlayer;
                clickCount = playerData.total_clicks || 0;
                totalSecondsPlayed = playerData.total_seconds_played || 0;
                lastClickTime = playerData.last_click_at ? new Date(playerData.last_click_at) : null;
                updateUI();
            } else {
                const loaded = await loadPlayerData(user.id);
                if (loaded) {
                    playerData = loaded;
                    clickCount = loaded.total_clicks || 0;
                    totalSecondsPlayed = loaded.total_seconds_played || 0;
                    lastClickTime = loaded.last_click_at ? new Date(loaded.last_click_at) : null;
                    updateUI();
                } else {
                    authMessage.textContent = '⚠️ Ошибка загрузки профиля.';
                }
            }
        }

        // ============================================================
        //  ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pass = passwordInput.value.trim();
            if (!email || !pass) { authMessage.textContent = 'Заполните email и пароль'; return; }
            const ok = await signIn(email, pass);
            if (ok) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) await onUserLoggedIn(user);
            }
        });

        registerBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const pass = passwordInput.value.trim();
            const nickname = nicknameInput.value.trim() || 'Игрок';
            if (!email || !pass) { authMessage.textContent = 'Заполните email и пароль'; return; }
            if (pass.length < 6) { authMessage.textContent = 'Пароль должен быть не менее 6 символов'; return; }
            await signUp(email, pass, nickname);
        });

        logoutBtn.addEventListener('click', signOut);

        moonWrapper.addEventListener('click', handleClick);
        moonWrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const rect = moonWrapper.getBoundingClientRect();
                const fakeEvent = { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 };
                handleClick(fakeEvent);
            }
        });
        moonWrapper.setAttribute('tabindex', '0');
        moonWrapper.setAttribute('role', 'button');

        // ============================================================
        //  ПРОВЕРКА АУТЕНТИФИКАЦИИ ПРИ ЗАГРУЗКЕ
        // ============================================================
        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                await onUserLoggedIn(session.user);
            } else {
                authBlock.style.display = 'block';
                gameArea.classList.remove('active');
            }
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session?.user) {
                    await onUserLoggedIn(session.user);
                } else if (event === 'SIGNED_OUT') {
                    await signOut();
                }
            });
        }
        init();
    </script>
</body>
</html>
