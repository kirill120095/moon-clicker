<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌙 Лунный кликер с аккаунтами</title>
    <!-- Подключаем Supabase JS через более надёжный CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2">
    </script>
    <style>
        /* (стили без изменений - можно взять из вашего кода) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0b0e1a 0%, #1a1f35 50%, #0b0e1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #f0e6d0;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 215, 150, 0.2);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
        }
        .auth-form input {
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #f0e6d0;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .auth-form input:focus {
            border-color: rgba(255, 215, 150, 0.5);
        }
        .auth-form .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .auth-form button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 215, 150, 0.15);
            color: #f0e6d0;
            border: 1px solid rgba(255, 215, 150, 0.2);
        }
        .auth-form button:hover {
            background: rgba(255, 215, 150, 0.25);
            transform: scale(1.03);
        }
        .auth-form .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .auth-form .success {
            color: #69db7c;
            font-size: 0.85rem;
        }
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }
        .moon-wrapper {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
            margin: 10px 0;
        }
        .moon-wrapper:active {
            transform: scale(0.92);
        }
        .moon-wrapper:hover {
            transform: scale(1.05);
        }
        .moon {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f5f0e8, #c8bda8 60%, #8a7e6b);
            box-shadow: 0 0 40px rgba(255, 215, 150, 0.3), 0 0 80px rgba(255, 215, 150, 0.15), inset -20px -20px 60px rgba(0, 0, 0, 0.3), inset 20px 20px 60px rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .moon::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, rgba(160, 140, 120, 0.4), rgba(100, 85, 75, 0.6));
            top: 25%;
            left: 20%;
            box-shadow: 60px 50px 0 -5px rgba(120, 100, 85, 0.4), -30px 70px 0 -8px rgba(140, 120, 105, 0.3), 80px -30px 0 -10px rgba(130, 110, 95, 0.35);
        }
        .moon::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(180, 160, 140, 0.3), rgba(100, 85, 75, 0.5));
            top: 60%;
            left: 70%;
            box-shadow: -40px -20px 0 -5px rgba(140, 120, 105, 0.3);
        }
        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 150, 0.4), transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
        .click-effect.active {
            animation: flash 0.3s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
        }
        .counter {
            margin: 15px 0 5px;
            color: #f0e6d0;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 215, 150, 0.2);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 30px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 120px;
        }
        .counter-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .player-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .logout-btn {
            margin-top: 15px;
            padding: 8px 25px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 600px) {
            .moon { width: 150px; height: 150px; }
            .counter { font-size: 2.2rem; padding: 6px 20px; min-width: 80px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🌙 Лунный кликер</h1>
        <p class="subtitle">Кликни по луне</p>

        <div id="authBlock" class="auth-form">
            <input type="email" id="emailInput" placeholder="Email" />
            <input type="password" id="passwordInput" placeholder="Пароль" />
            <div class="buttons">
                <button id="loginBtn">Войти</button>
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
            <div id="authMessage" class="error"></div>
        </div>

        <div id="gameArea" class="game-area">
            <div class="moon-wrapper" id="moonWrapper">
                <div class="moon" id="moon"></div>
                <div class="click-effect" id="clickEffect"></div>
            </div>
            <div>
                <div class="counter" id="counter">0</div>
                <div class="counter-label">кликов</div>
            </div>
            <div class="player-info" id="playerInfo">Загружаем...</div>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  НАСТРОЙКА SUPABASE (замените на свои данные)
        // ============================================================
        const SUPABASE_URL = 'https://zllnsmztaakdwjpnijsk.supabase.co'; // ваш URL
        const SUPABASE_ANON_KEY = 'ВАШ_ANON_ПУБЛИЧНЫЙ_КЛЮЧ'; // сюда вставьте правильный anon ключ

        // Проверяем, загрузилась ли библиотека
        if (typeof window.supabase === 'undefined') {
            document.getElementById('authMessage').textContent = '⚠️ Не удалось загрузить библиотеку Supabase. Проверьте интернет.';
            throw new Error('Supabase library not loaded');
        }

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        //  ОСТАЛЬНАЯ ЛОГИКА (полностью аналогична вашему коду)
        //  Ниже вставьте ВЕСЬ ваш код (переменные, функции, обработчики)
        //  Но только ОДИН РАЗ, без дублирования.
        // ============================================================

        // (Здесь продолжается ваш код, который вы уже написали,
        //  начиная с объявления let currentUser = null; ... и до конца.)

    </script>
</body>
</html>
